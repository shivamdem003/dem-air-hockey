<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey - Pro Gravity Colosseum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }
        
        #menu { 
            margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 12px; 
            border: 1px solid #333; display: flex; gap: 15px; align-items: center; 
            z-index: 10; flex-wrap: wrap; justify-content: center; 
        }
        
        /* Hide menu automatically when in fullscreen */
        :fullscreen #menu { display: none; }
        :-webkit-full-screen #menu { display: none; }

        .hud { 
            display: flex; justify-content: space-between; 
            width: 95%; max-width: 1000px; align-items: center; margin-bottom: 10px; 
        }
        
        canvas { 
            width: 100%; 
            max-width: 1000px; 
            max-height: 65vh; /* Prevents overflow on mobile landscape */
            height: auto; 
            aspect-ratio: 1000 / 600; 
            border: 2px solid #222; background: #000; cursor: none; 
            box-shadow: 0 0 30px rgba(0,255,255,0.05); touch-action: none; 
            object-fit: contain;
        }

        /* Allow the canvas to use more vertical space when the menu hides in fullscreen */
        :fullscreen canvas { max-height: 85vh; }
        :-webkit-full-screen canvas { max-height: 85vh; }
        
        .score { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 10px #0ff; min-width: 80px; text-align: center; }
        .series-dots { font-size: 1.5rem; letter-spacing: 5px; color: #333; }
        .series-dots .won { color: #0ff; text-shadow: 0 0 8px #0ff; }
        .series-dots.p2 .won { color: #f0f; text-shadow: 0 0 8px #f0f; }
        
        .round-display { text-align: center; color: #ccc; background: rgba(255,255,255,0.03); padding: 12px 50px; border-radius: 15px; border: 1px solid #333; min-width: 300px; }
        #round-label { font-size: 1rem; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        #table-type { display: block; font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; }

        button { background: #0ff; border: none; padding: 8px 18px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s; color: #000; text-transform: uppercase; }
        button:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
        button:disabled { background: #222; color: #444; cursor: not-allowed; }
        
        #pause-btn { background: #ffaa00; }
        .pause-count { font-size: 0.8rem; color: #888; margin-left: 5px; }

        input, select { background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; outline: none; }
        input { width: 180px; }
        
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.96); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #0ff; display: none; z-index: 100; min-width: 500px; }
        
        .stats-container { margin-top: 20px; width: 100%; border-top: 1px solid #333; padding-top: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 10px; align-items: center; }
        .stat-label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        .stat-val { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .p1-stat { color: #0ff !important; }
        .p2-stat { color: #f0f !important; }

        .rank-box { margin-bottom: 15px; }
        .rank-letter { font-size: 4rem; font-weight: 900; line-height: 1; margin: 5px 0; }
        .rank-s { color: #ffdf00; text-shadow: 0 0 25px rgba(255,223,0,0.8); }
        .rank-a { color: #ff4e00; text-shadow: 0 0 15px rgba(255,78,0,0.5); }
        .rank-b { color: #00ff00; }
        .rank-c { color: #0084ff; }
        .rank-d { color: #888; }

        #status { color: #555; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="menu">
        <div>ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Paste Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
        
        <div style="border-left: 1px solid #333; height: 20px; margin: 0 5px;"></div>
        
        <select id="ai-difficulty" style="background: #111; color: #0ff; border: 1px solid #444; padding: 7px; border-radius: 4px;">
            <option value="easy">Easy AI</option>
            <option value="medium" selected>Medium AI</option>
            <option value="hard">Hard AI</option>
        </select>
        <button onclick="startOfflineMatch()" style="background: #f0f;">Play Offline</button>

        <div style="border-left: 1px solid #333; height: 20px; margin: 0 5px;"></div>
        
        <button id="pause-btn" onclick="requestPause()">Pause Game</button>
        <div class="pause-count">Pauses: <span id="p1-pauses">4</span> | <span id="p2-pauses">4</span></div>

        <div style="border-left: 1px solid #333; height: 20px; margin: 0 5px;"></div>
        <button onclick="toggleFullScreen()" style="background: #0084ff; color: white;">⛶ Fullscreen</button>
    </div>

    <div class="hud">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s1">0</div>
            <div id="series-p1" class="series-dots">● ●</div>
        </div>
        
        <div class="round-display">
            <div id="round-label"><b>ROUND <span id="round-num">1</span></b></div>
            <span id="table-type">VELOCITY SURGE</span>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s2" style="color:#f0f; text-shadow: 0 0 10px #f0f;">0</div>
            <div id="series-p2" class="series-dots p2">● ●</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="status">Waiting for connection...</div>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 2.2rem;">-</h1>
        <p id="sub-text" style="color: #888; font-size: 1rem; margin-top: 5px;">Preparing arena...</p>
        
        <div id="stats-ui" class="stats-container" style="display:none;">
            <div class="stats-grid">
                <div class="rank-box">
                    <div class="stat-label">Rank</div>
                    <div class="rank-letter" id="rank-p1">-</div>
                </div>
                <div></div>
                <div class="rank-box">
                    <div class="stat-label">Rank</div>
                    <div class="rank-letter" id="rank-p2">-</div>
                </div>

                <div class="stat-val p1-stat" id="stat-p1-goals">0</div>
                <div class="stat-label">Total Goals</div>
                <div class="stat-val p2-stat" id="stat-p2-goals">0</div>

                <div class="stat-val p1-stat" id="stat-p1-saves">0</div>
                <div class="stat-label">Critical Saves</div>
                <div class="stat-val p2-stat" id="stat-p2-saves">0</div>

                <div class="stat-val p1-stat" id="stat-p1-own">0</div>
                <div class="stat-label">Own Goals</div>
                <div class="stat-val p2-stat" id="stat-p2-own">0</div>
            </div>
        </div>

        <div style="margin-top:25px; display: flex; gap:10px; justify-content: center;">
            <button id="resume-btn" style="display:none; background:#0f0;" onclick="resumeGame()">Resume</button>
            <button id="restart-btn" style="display:none;" onclick="resetFullMatch()">Start New Series</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    
    // Game State Variables
    let isHost = false, gameActive = true, isPaused = false, disconnected = false;
    let isOffline = false;
    let aiLoopStarted = false;

    // Physics Constants
    const centerX = 500, centerY = 300, tableRadius = 280, cornerRadius = 45, goalHeight = 160;
    const WIN_SCORE = 13, SERIES_TO_WIN = 2;
    
    let currentRound = 1, lastWinnerLabel = "", shakeIntensity = 0; 
    let scores = { p1: 0, p2: 0 }, seriesPoints = { p1: 0, p2: 0 }, pausesLeft = { p1: 4, p2: 4 };
    let respawnTimer = 0, lastHitter = 0;

    let matchStats = {
        p1: { goals: 0, saves: 0, ownGoals: 0, totalHits: 0, rank: "C" },
        p2: { goals: 0, saves: 0, ownGoals: 0, totalHits: 0, rank: "C" }
    };

    const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 15, friction: 0.993 };
    const p1 = { x: 150, y: 300, vx: 0, vy: 0, radius: 32, color: '#0ff' };
    const p2 = { x: 850, y: 300, vx: 0, vy: 0, radius: 32, color: '#f0f' };
    let goalY = (canvas.height - goalHeight) / 2, goalDir = 1;

    // Touch support flag
    let isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    // Fullscreen Logic
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable full-screen mode: ${err.message}`);
            });
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Orientation lock not supported or failed."));
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    // Networking Setup
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isHost = true; isOffline = false; setupConnection(); });

    function connectToFriend() {
        conn = peer.connect(document.getElementById('remote-id').value);
        isHost = false; 
        isOffline = false;
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "LINK ESTABLISHED";
            disconnected = false; if(isHost) resetPuck();
            if (!aiLoopStarted) { aiLoopStarted = true; gameLoop(); }
        });
        conn.on('close', () => handleDisconnection());
        conn.on('error', () => handleDisconnection());
        conn.on('data', data => {
            if (data.type === 'PAUSE_REQ') handlePauseRequest(data.player);
            else if (data.type === 'RESUME') { isPaused = false; updateUI(); }
            else if (isHost) {
                p2.vx = data.x - p2.x; p2.vy = data.y - p2.y;
                p2.x = data.x; p2.y = data.y;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y; puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores; seriesPoints = data.series; pausesLeft = data.pausesLeft;
                currentRound = data.round; gameActive = data.gameActive; isPaused = data.isPaused;
                matchStats = data.stats; goalY = data.goalY; respawnTimer = data.respawnTimer;
                lastWinnerLabel = data.lastWinnerLabel; 
                if (respawnTimer >= 158) shakeIntensity = 12;
                updateUI();
            }
        });
    }

    // Offline Mode Logic
    function startOfflineMatch() {
        isOffline = true;
        isHost = true;
        disconnected = false;
        
        if (conn) { conn.close(); conn = null; }

        document.getElementById('status').innerText = "OFFLINE MODE: AI ACTIVE";
        resetFullMatch();
        
        if (!aiLoopStarted) {
            aiLoopStarted = true;
            gameLoop();
        }
    }

    function updateAI() {
        if (!gameActive || isPaused || respawnTimer > 0) return;

        const difficulty = document.getElementById('ai-difficulty').value;
        let speedMult = 0.05;
        let maxSpeed = 5;
        let targetX = p2.x;
        
        const curGoalCenter = (currentRound === 3) ? goalY + (goalHeight / 2) : centerY;
        let targetY = curGoalCenter; 

        if (difficulty === 'easy') { speedMult = 0.03; maxSpeed = 4; }
        else if (difficulty === 'medium') { speedMult = 0.08; maxSpeed = 8; }
        else if (difficulty === 'hard') { speedMult = 0.16; maxSpeed = 15; }

        if (puck.x > centerX) {
            targetX = puck.x;
            targetY = puck.y;
            if (difficulty === 'hard') {
                 targetY += puck.dy * 8;
                 targetX += puck.dx * 8;
            }
        } else {
            targetX = canvas.width - 150; 
            targetY = puck.y; 
            targetY = Math.max(curGoalCenter - 100, Math.min(curGoalCenter + 100, targetY));
        }

        let dx = targetX - p2.x;
        let dy = targetY - p2.y;

        p2.vx = dx * speedMult;
        p2.vy = dy * speedMult;

        let speed = Math.sqrt(p2.vx**2 + p2.vy**2);
        if (speed > maxSpeed) {
            p2.vx = (p2.vx / speed) * maxSpeed;
            p2.vy = (p2.vy / speed) * maxSpeed;
        }

        p2.x += p2.vx;
        p2.y += p2.vy;

        p2.x = Math.max(p2.x, centerX + p2.radius);
        p2.y = Math.max(p2.radius, Math.min(canvas.height - p2.radius, p2.y));
        if (currentRound === 2) applyCircleConstraint(p2, "right");
    }

    // Game Control & Networking Handlers
    function handleDisconnection() {
        if (disconnected || isOffline) return;
        disconnected = true; gameActive = false; isPaused = false; updateUI();
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.getElementById('winner-text').innerText = "CONNECTION LOST";
        document.getElementById('winner-text').style.color = "#ff0000";
        document.getElementById('sub-text').innerText = "Opponent fled. Automatic match win.";
        document.getElementById('resume-btn').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'inline-block';
    }

    function requestPause() {
        if (!gameActive || isPaused || disconnected) return;
        const playerKey = isHost ? 'p1' : 'p2';
        if (pausesLeft[playerKey] > 0) {
            if (isHost || isOffline) handlePauseRequest(playerKey);
            else if (conn) conn.send({ type: 'PAUSE_REQ', player: 'p2' });
        }
    }

    function handlePauseRequest(player) {
        if (pausesLeft[player] > 0) {
            isPaused = true; pausesLeft[player]--;
            syncData(); updateUI();
        }
    }

    function resumeGame() {
        if (disconnected) return;
        isPaused = false;
        if (isHost || isOffline) syncData(); else if (conn) conn.send({ type: 'RESUME' });
        updateUI();
    }

    // Input Handlers & Scaling
    function getScaledPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function handleInput(e) {
        if (!gameActive || isPaused || disconnected) return;
        
        let clientX, clientY;
        
        if (e.type.startsWith('touch')) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            if (e.cancelable) e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        const pos = getScaledPos(clientX, clientY);

        if (isHost || isOffline) {
            p1.vx = pos.x - p1.x; p1.vy = pos.y - p1.y;
            p1.x = Math.min(pos.x, canvas.width/2 - p1.radius);
            p1.y = Math.max(p1.radius, Math.min(canvas.height - p1.radius, pos.y));
            if (currentRound === 2) applyCircleConstraint(p1, "left");
        } else {
            p2.x = Math.max(pos.x, canvas.width/2 + p2.radius);
            p2.y = Math.max(p2.radius, Math.min(canvas.height - p2.radius, pos.y));
            if (currentRound === 2) applyCircleConstraint(p2, "right");
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    }

    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchstart', handleInput, { passive: false });
    canvas.addEventListener('touchmove', handleInput, { passive: false });
    canvas.addEventListener('touchend', handleInput, { passive: false });

    // Physics Engine
    function applyCircleConstraint(p, side) {
        let dx = p.x - centerX, dy = p.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - p.radius) {
            let angle = Math.atan2(dy, dx);
            p.x = centerX + Math.cos(angle) * (tableRadius - p.radius);
            p.y = centerY + Math.sin(angle) * (tableRadius - p.radius);
        }
        p.x = (side === "left") ? Math.min(p.x, centerX - 5) : Math.max(p.x, centerX + 5);
    }

    function update() {
        if (shakeIntensity > 0) shakeIntensity *= 0.92;
        if (isPaused || disconnected) return;
        if (!isHost || !gameActive) return;

        if (respawnTimer > 0) {
            respawnTimer--;
            if (respawnTimer === 0) {
                puck.dx = (Math.random() > 0.5 ? 1.5 : -1.5);
                puck.dy = (Math.random() - 0.5) * 2;
                lastHitter = 0;
            }
            syncData(); return;
        }

        if (isOffline) updateAI();

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        if (currentRound === 2) updateCirclePhysics();
        else updateRectPhysics();

        checkCollision(p1, puck, 1);
        checkCollision(p2, puck, 2);
        updateUI(); syncData();
    }

    function syncData() {
        if (conn && conn.open && isHost && !isOffline) {
            conn.send({ p1, puck, scores, series: seriesPoints, pausesLeft, round: currentRound, gameActive, isPaused, goalY, respawnTimer, lastWinnerLabel, stats: matchStats });
        }
    }

    function triggerGoal(scoredOnPlayer) {
        if (scoredOnPlayer === 1) {
            scores.p2++;
            if (lastHitter === 1) matchStats.p1.ownGoals++;
            else if (lastHitter === 2) matchStats.p2.goals++;
        } else {
            scores.p1++;
            if (lastHitter === 2) matchStats.p2.ownGoals++;
            else if (lastHitter === 1) matchStats.p1.goals++;
        }
        shakeIntensity = 15; resetPuck();
    }

    function updateRectPhysics() {
        const curGoalTop = (currentRound === 3) ? goalY : (canvas.height - goalHeight)/2;
        const curGoalBottom = curGoalTop + goalHeight;
        if (currentRound === 1) {
            const pxStart = centerX - 75, pxEnd = centerX + 75;
            if (puck.y < puck.radius && puck.x > pxStart && puck.x < pxEnd) {
                puck.dy = 12; puck.dx = (puck.x < centerX) ? 10 : -10; puck.y = puck.radius + 10;
            } else if (puck.y > canvas.height - puck.radius && puck.x > pxStart && puck.x < pxEnd) {
                puck.dy = -12; puck.dx = (puck.x < centerX) ? 10 : -10; puck.y = canvas.height - puck.radius - 10;
            }
        }
        if (currentRound === 3) {
            goalY += 5.5 * goalDir;
            if (goalY > canvas.height - goalHeight || goalY < 0) goalDir *= -1;
        }
        const corners = [{cx: cornerRadius, cy: cornerRadius}, {cx: canvas.width - cornerRadius, cy: cornerRadius}, {cx: cornerRadius, cy: canvas.height - cornerRadius}, {cx: canvas.width - cornerRadius, cy: canvas.height - cornerRadius}];
        corners.forEach((c, i) => {
            let inX = (i % 2 === 0) ? puck.x < c.cx : puck.x > c.cx, inY = (i < 2) ? puck.y < c.cy : puck.y > c.cy;
            if (inX && inY) {
                let dx = puck.x - c.cx, dy = puck.y - c.cy, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > cornerRadius - puck.radius) {
                    let angle = Math.atan2(dy, dx), speed = Math.sqrt(puck.dx**2 + puck.dy**2);
                    let reflection = 2 * angle - Math.atan2(puck.dy, puck.dx) + Math.PI;
                    puck.dx = Math.cos(reflection) * speed; puck.dy = Math.sin(reflection) * speed;
                    puck.x = c.cx + Math.cos(angle) * (cornerRadius - puck.radius - 1);
                    puck.y = c.cy + Math.sin(angle) * (cornerRadius - puck.radius - 1);
                }
            }
        });
        if (puck.y < puck.radius) { puck.y = puck.radius; puck.dy *= -1; }
        else if (puck.y > canvas.height - puck.radius) { puck.y = canvas.height - puck.radius; puck.dy *= -1; }
        if (puck.x < puck.radius) {
            if (puck.y > curGoalTop && puck.y < curGoalBottom) triggerGoal(1);
            else { puck.x = puck.radius; puck.dx *= -1; }
        } else if (puck.x > canvas.width - puck.radius) {
            if (puck.y > curGoalTop && puck.y < curGoalBottom) triggerGoal(2);
            else { puck.x = canvas.width - puck.radius; puck.dx *= -1; }
        }
    }

    function updateCirclePhysics() {
        let dx = puck.x - centerX, dy = puck.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 200) { puck.dx -= dx * 0.0005; puck.dy -= dy * 0.0005; }
        if (dist > tableRadius - puck.radius) {
            let angle = Math.atan2(dy, dx), deg = angle * (180 / Math.PI);
            if (Math.abs(deg) < 22) triggerGoal(2);
            else if (Math.abs(deg) > 158) triggerGoal(1);
            else {
                let normal = Math.atan2(dy, dx), speed = Math.sqrt(puck.dx**2 + puck.dy**2);
                let reflection = 2 * normal - Math.atan2(puck.dy, puck.dx) + Math.PI;
                puck.dx = Math.cos(reflection) * speed * 0.99; puck.dy = Math.sin(reflection) * speed * 0.99;
                puck.x = centerX + Math.cos(normal) * (tableRadius - puck.radius - 2);
                puck.y = centerY + Math.sin(normal) * (tableRadius - puck.radius - 2);
            }
        }
    }

    function checkCollision(paddle, pk, pNum) {
        let dx = pk.x - paddle.x, dy = pk.y - paddle.y, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < paddle.radius + pk.radius) {
            matchStats['p' + pNum].totalHits++;
            if ((pNum === 1 && pk.dx < 0) || (pNum === 2 && pk.dx > 0)) matchStats['p' + pNum].saves++;
            lastHitter = pNum;
            let angle = Math.atan2(dy, dx), impactVel = Math.sqrt(paddle.vx**2 + paddle.vy**2);
            let speed = Math.sqrt(pk.dx**2 + pk.dy**2) + (impactVel * 0.4) + 1.5;
            pk.dx = Math.cos(angle) * Math.min(speed, 21); pk.dy = Math.sin(angle) * Math.min(speed, 21);
            pk.x = paddle.x + Math.cos(angle) * (paddle.radius + pk.radius + 2);
            pk.y = paddle.y + Math.sin(angle) * (paddle.radius + pk.radius + 2);
        }
    }

    // Game Logic & UI Updates
    function calculateGrade(pKey) {
        const s = matchStats[pKey];
        const isWinner = seriesPoints[pKey] >= SERIES_TO_WIN;
        const accuracy = s.totalHits > 0 ? (s.goals / s.totalHits) : 0;
        let score = (s.goals * 25) + (s.saves * 12) - (s.ownGoals * 45) + (accuracy * 100);
        if (isWinner) score += 50;
        if (score >= 600) return "S";
        if (score >= 450) return "A";
        if (score >= 300) return "B";
        if (score >= 150) return "C";
        return "D";
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;
        document.getElementById('round-num').innerText = currentRound;
        document.getElementById('p1-pauses').innerText = pausesLeft.p1;
        document.getElementById('p2-pauses').innerText = pausesLeft.p2;
        
        const arenaNames = ["VELOCITY SURGE", "GRAVITY ORBIT", "NEON SHIFTER"];
        document.getElementById('table-type').innerText = arenaNames[currentRound - 1] || "HYPERSPACE";
        
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
        const playerKey = isHost ? 'p1' : 'p2';
        document.getElementById('pause-btn').disabled = pausesLeft[playerKey] <= 0 || isPaused || disconnected;
        
        const overlay = document.getElementById('overlay'), statsUI = document.getElementById('stats-ui');

        if (disconnected && !isOffline) { overlay.style.display = 'block'; }
        else if (isPaused) {
            overlay.style.display = 'block';
            document.getElementById('winner-text').innerText = "GAME PAUSED";
            document.getElementById('sub-text').innerText = "Strategic timeout...";
            document.getElementById('resume-btn').style.display = 'inline-block';
            statsUI.style.display = 'none';
        } else if (!gameActive) {
            overlay.style.display = 'block';
            document.getElementById('winner-text').innerText = isMatchOver ? lastWinnerLabel + " VICTORIOUS" : lastWinnerLabel + " ROUND WIN";
            document.getElementById('sub-text').innerText = isMatchOver ? "Series Concluded" : "Preparing next colosseum...";
            document.getElementById('resume-btn').style.display = 'none';
            
            if (isMatchOver) {
                statsUI.style.display = 'block';
                const p1G = matchStats.p1.rank, p2G = matchStats.p2.rank;
                const r1 = document.getElementById('rank-p1'), r2 = document.getElementById('rank-p2');
                r1.innerText = p1G; r2.innerText = p2G;
                r1.className = `rank-letter rank-${p1G.toLowerCase()}`;
                r2.className = `rank-letter rank-${p2G.toLowerCase()}`;

                document.getElementById('stat-p1-goals').innerText = matchStats.p1.goals;
                document.getElementById('stat-p2-goals').innerText = matchStats.p2.goals;
                document.getElementById('stat-p1-saves').innerText = matchStats.p1.saves;
                document.getElementById('stat-p2-saves').innerText = matchStats.p2.saves;
                document.getElementById('stat-p1-own').innerText = matchStats.p1.ownGoals;
                document.getElementById('stat-p2-own').innerText = matchStats.p2.ownGoals;
                if(isHost || isOffline) document.getElementById('restart-btn').style.display = 'inline-block';
            }
        } else { overlay.style.display = 'none'; }
        
        const renderDots = (id, pts) => {
            let dots = ""; for(let i=0; i<SERIES_TO_WIN; i++) dots += `<span class="${i < pts ? 'won' : ''}">●</span> `;
            document.getElementById(id).innerHTML = dots;
        };
        renderDots('series-p1', seriesPoints.p1); renderDots('series-p2', seriesPoints.p2);
    }

    function resetPuck() {
        puck.x = centerX; puck.y = centerY; puck.dx = 0; puck.dy = 0;
        if(isHost || isOffline) {
            if (scores.p1 >= WIN_SCORE) startNewRound("PLAYER 1");
            else if (scores.p2 >= WIN_SCORE) startNewRound("PLAYER 2");
            else respawnTimer = 160;
        }
    }

    function startNewRound(winner) {
        gameActive = false; lastWinnerLabel = winner; seriesPoints[winner === "PLAYER 1" ? 'p1' : 'p2']++;
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
        if (isMatchOver && (isHost || isOffline)) {
            matchStats.p1.rank = calculateGrade('p1');
            matchStats.p2.rank = calculateGrade('p2');
        }
        updateUI(); syncData(); 
        if (!isMatchOver) {
            setTimeout(() => {
                if (disconnected && !isOffline) return;
                scores = {p1:0, p2:0}; currentRound++; gameActive = true; resetPuck(); updateUI();
            }, 3000);
        }
    }

    function resetFullMatch() {
        seriesPoints = { p1: 0, p2: 0 }; scores = { p1: 0, p2: 0 };
        matchStats = { p1: { goals: 0, saves: 0, ownGoals: 0, totalHits: 0, rank: "C" }, p2: { goals: 0, saves: 0, ownGoals: 0, totalHits: 0, rank: "C" } };
        currentRound = 1; gameActive = true; lastWinnerLabel = ""; pausesLeft = { p1: 4, p2: 4 };
        disconnected = false; document.getElementById('restart-btn').style.display = 'none';
        resetPuck(); updateUI();
    }

    // Rendering
    function draw() {
        ctx.save();
        if (shakeIntensity > 0.5) ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity);
        ctx.fillStyle = '#050505'; ctx.fillRect(-20, -20, canvas.width+40, canvas.height+40);
        if (currentRound === 2) {
            ctx.save(); ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, 0, Math.PI * 2); ctx.clip();
            ctx.fillStyle = '#000'; ctx.fillRect(0,0, canvas.width, canvas.height);
            let grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, tableRadius);
            grad.addColorStop(0, 'rgba(0, 255, 255, 0.05)'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fill(); ctx.restore();
            ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 6; ctx.stroke();
            ctx.lineWidth = 12; ctx.strokeStyle = '#f0f'; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, Math.PI - 0.35, Math.PI + 0.35); ctx.stroke();
            ctx.strokeStyle = '#0ff'; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, -0.35, 0.35); ctx.stroke();
        } else {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 6; ctx.beginPath(); ctx.roundRect(0, 0, canvas.width, canvas.height, cornerRadius); ctx.stroke();
            const curY = (currentRound === 3) ? goalY : (canvas.height - goalHeight)/2;
            ctx.fillStyle = '#0ff'; ctx.fillRect(0, curY, 6, goalHeight);
            ctx.fillStyle = '#f0f'; ctx.fillRect(canvas.width-6, curY, 6, goalHeight);
        }
        if (currentRound === 1) {
            ctx.shadowBlur = 10; ctx.shadowColor = '#0f0'; ctx.fillStyle = '#0f0';
            ctx.fillRect(centerX-75, -5, 150, 10); ctx.fillRect(centerX-75, canvas.height - 5, 150, 10);
        }
        ctx.shadowBlur = 0; ctx.setLineDash([15, 15]); ctx.strokeStyle = '#1a1a1a';
        ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();
        ctx.setLineDash([]); ctx.shadowBlur = 2; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
        drawP(p1); drawP(p2);
        if (respawnTimer > 0) {
            ctx.textAlign = "center"; ctx.shadowBlur = 0;
            if (respawnTimer > 110) { ctx.fillStyle = "#fff"; ctx.font = "bold 70px 'Segoe UI'"; ctx.fillText("GOAL!", centerX, centerY - 20); }
            else { ctx.fillStyle = "#0ff"; ctx.font = "bold 90px 'Segoe UI'"; ctx.fillText(Math.ceil(respawnTimer / 60), centerX, centerY + 30); }
        }
        ctx.restore(); 
    }

    function drawP(p) {
        ctx.shadowBlur = 2; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0; ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2; ctx.stroke();
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
</script>
