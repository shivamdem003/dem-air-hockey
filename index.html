const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const peer = new Peer(); 
let conn;
let isHost = false, gameActive = true, isPaused = false, disconnected = false;

// Physics Constants
const PUCK_FRICTION = 0.995;
const MAX_PUCK_SPEED = 20;
const LERP_FACTOR = 0.35; // Smoothing factor for the client (0.1 to 0.5)

let lastTime = performance.now();
let currentRound = 1, lastWinnerLabel = "", shakeIntensity = 0; 
let scores = { p1: 0, p2: 0 }, seriesPoints = { p1: 0, p2: 0 }, pausesLeft = { p1: 4, p2: 4 };
let respawnTimer = 0, lastHitter = 0;

let matchStats = {
    p1: { goals: 0, saves: 0, ownGoals: 0, totalHits: 0, rank: "C" },
    p2: { goals: 0, saves: 0, ownGoals: 0, totalHits: 0, rank: "C" }
};

const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 15 };
const p1 = { x: 150, y: 300, vx: 0, vy: 0, radius: 32, color: '#0ff' };
const p2 = { x: 850, y: 300, vx: 0, vy: 0, radius: 32, color: '#f0f' };

// Targeting variables for Client-side interpolation
let targetPuck = { x: 500, y: 300 };
let targetP1 = { x: 150, y: 300 };

peer.on('open', id => document.getElementById('my-id').innerText = id);
peer.on('connection', c => { conn = c; isHost = true; setupConnection(); });

function connectToFriend() {
    conn = peer.connect(document.getElementById('remote-id').value);
    isHost = false; setupConnection();
}

function setupConnection() {
    conn.on('open', () => {
        document.getElementById('status').innerText = "LINK ESTABLISHED";
        disconnected = false; 
        if(isHost) resetPuck();
        requestAnimationFrame(gameLoop);
    });
    
    conn.on('data', data => {
        if (data.type === 'PAUSE_REQ') handlePauseRequest(data.player);
        else if (data.type === 'RESUME') { isPaused = false; updateUI(); }
        else if (isHost) {
            // Host receives Opponent (P2) position
            p2.vx = data.x - p2.x;
            p2.vy = data.y - p2.y;
            p2.x = data.x;
            p2.y = data.y;
        } else {
            // Client receives World State from Host
            targetP1.x = data.p1.x;
            targetP1.y = data.p1.y;
            targetPuck.x = data.puck.x;
            targetPuck.y = data.puck.y;
            
            // Sync metadata
            scores = data.scores;
            seriesPoints = data.series;
            pausesLeft = data.pausesLeft;
            currentRound = data.round;
            gameActive = data.gameActive;
            isPaused = data.isPaused;
            matchStats = data.stats;
            respawnTimer = data.respawnTimer;
            updateUI();
        }
    });
}

function gameLoop(now) {
    const dt = (now - lastTime) / 16.66; // Normalized to 60fps
    lastTime = now;

    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

function update(dt) {
    if (isPaused || disconnected || !gameActive) return;

    if (isHost) {
        // HOST: Authoritative Physics
        if (respawnTimer > 0) {
            respawnTimer -= dt;
            if (respawnTimer <= 0) {
                respawnTimer = 0;
                puck.dx = (Math.random() > 0.5 ? 4 : -4);
                puck.dy = (Math.random() - 0.5) * 6;
            }
        } else {
            // Move Puck
            puck.x += puck.dx * dt;
            puck.y += puck.dy * dt;
            puck.dx *= Math.pow(PUCK_FRICTION, dt);
            puck.dy *= Math.pow(PUCK_FRICTION, dt);

            // Handle Walls and Goals
            updatePhysics(dt);
            
            // Handle Collisions
            checkCollision(p1, puck, 1);
            checkCollision(p2, puck, 2);
        }
        syncData();
    } else {
        // CLIENT: Interpolation (Smooth follow)
        puck.x += (targetPuck.x - puck.x) * LERP_FACTOR;
        puck.y += (targetPuck.y - puck.y) * LERP_FACTOR;
        p1.x += (targetP1.x - p1.x) * LERP_FACTOR;
        p1.y += (targetP1.y - p1.y) * LERP_FACTOR;
    }
    
    if (shakeIntensity > 0) shakeIntensity *= 0.9;
}

function checkCollision(paddle, pk, pNum) {
    let dx = pk.x - paddle.x;
    let dy = pk.y - paddle.y;
    let distance = Math.sqrt(dx * dx + dy * dy);
    let minDistance = paddle.radius + pk.radius;

    if (distance < minDistance) {
        // Realistic Physics: Angle of reflection based on hit point
        let angle = Math.atan2(dy, dx);
        
        // Combine puck velocity and paddle momentum
        let paddleSpeed = Math.sqrt(paddle.vx * paddle.vx + paddle.vy * paddle.vy);
        let speed = Math.sqrt(pk.dx * pk.dx + pk.dy * pk.dy) + (paddleSpeed * 0.5);
        
        pk.dx = Math.cos(angle) * Math.min(speed + 1, MAX_PUCK_SPEED);
        pk.dy = Math.sin(angle) * Math.min(speed + 1, MAX_PUCK_SPEED);

        // Prevent sticking: Move puck outside paddle radius immediately
        pk.x = paddle.x + Math.cos(angle) * (minDistance + 2);
        pk.y = paddle.y + Math.sin(angle) * (minDistance + 2);
        
        lastHitter = pNum;
        matchStats['p' + pNum].totalHits++;
    }
}

function syncData() {
    if (conn && conn.open && isHost) {
        conn.send({
            p1: { x: p1.x, y: p1.y },
            puck: { x: puck.x, y: puck.y },
            scores, series: seriesPoints, pausesLeft,
            round: currentRound, gameActive, isPaused,
            respawnTimer, stats: matchStats
        });
    }
}
