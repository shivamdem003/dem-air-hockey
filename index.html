<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Hockey - Omni Arena (Visible Surge)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; display: flex; gap: 15px; align-items: center; z-index: 10; }
        canvas { border: 2px solid #222; background: #000; cursor: none; box-shadow: 0 0 30px rgba(0,255,255,0.05); }
        .hud { display: flex; justify-content: space-between; width: 1000px; align-items: center; margin-bottom: 20px; }
        .score { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 10px #0ff; min-width: 80px; text-align: center; }
        .series-dots { font-size: 1.5rem; letter-spacing: 5px; color: #333; }
        .series-dots .won { color: #0ff; text-shadow: 0 0 8px #0ff; }
        .series-dots.p2 .won { color: #f0f; text-shadow: 0 0 8px #f0f; }
        
        .round-display { text-align: center; color: #ccc; background: rgba(255,255,255,0.03); padding: 12px 50px; border-radius: 15px; border: 1px solid #333; min-width: 320px; }
        #round-label { font-size: 0.9rem; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        #table-type { display: block; font-size: 1.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; }

        button { background: #0ff; border: none; padding: 8px 18px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s; color: #000; text-transform: uppercase; }
        button:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
        
        select { background: #111; color: #0ff; border: 1px solid #444; padding: 7px; border-radius: 4px; outline: none; cursor: pointer; font-weight: bold; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.96); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #0ff; display: none; z-index: 100; min-width: 500px; }
        #status { color: #0f0; margin-top: 10px; font-size: 0.9rem; font-weight: bold; }
        input { background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; outline: none; width: 180px; }
    </style>
</head>
<body>

    <div id="menu">
        <div>ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
        <select id="difficulty" onchange="updateDifficulty()">
            <option value="stalker">EASY: STALKER</option>
            <option value="pro" selected>HARD: BALANCED PRO</option>
            <option value="god">INSANE: GOD MODE</option>
        </select>
        <button id="pause-btn" style="background:#ffaa00;" onclick="requestPause()">Pause</button>
    </div>

    <div class="hud">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s1">0</div>
            <div id="series-p1" class="series-dots">● ●</div>
        </div>
        
        <div class="round-display">
            <div id="round-label"><b>PHASE <span id="round-num">1</span></b></div>
            <span id="table-type">ACCELERATION SURGE</span>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s2" style="color:#f0f; text-shadow: 0 0 10px #f0f;">0</div>
            <div id="series-p2" class="series-dots p2">● ●</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="status">PRACTICE MODE ACTIVE</div>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 2.2rem;">-</h1>
        <button id="restart-btn" style="margin-top:20px;" onclick="location.reload()">New Series</button>
        <button id="resume-btn" style="margin-top:20px; background:#0f0; display:none;" onclick="resumeGame()">Resume</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn, isHost = true, isOffline = true, gameActive = true, isPaused = false;
    let aiDifficulty = "pro";

    const centerX = 500, centerY = 300, tableRadius = 280, goalHeight = 160;
    const WIN_SCORE = 13, SERIES_TO_WIN = 2;
    const MAP_NAMES = ["ACCELERATION SURGE", "GRAVITY WELL", "SHIFTING VORTEX"];
    
    let currentRound = 1, lastWinnerLabel = "", shakeIntensity = 0; 
    let scores = { p1: 0, p2: 0 }, seriesPoints = { p1: 0, p2: 0 };
    let respawnTimer = 0, lastHitter = 0;
    let surgeActiveTop = false, surgeActiveBottom = false;

    const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 15, friction: 0.99, maxSpeed: 22 };
    const p1 = { x: 150, y: 300, vx: 0, vy: 0, lastX: 150, lastY: 300, radius: 32, color: '#0ff' };
    const p2 = { x: 850, y: 300, vx: 0, vy: 0, lastX: 850, lastY: 300, radius: 32, color: '#f0f' };
    let goalY = (canvas.height - goalHeight) / 2, goalDir = 1;

    window.onload = () => { resetPuck(); gameLoop(); };

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isHost = true; isOffline = false; setupConnection(); });

    function updateDifficulty() { aiDifficulty = document.getElementById('difficulty').value; }

    function connectToFriend() {
        const id = document.getElementById('remote-id').value;
        if(!id) return;
        conn = peer.connect(id); isHost = false; isOffline = false; setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => { document.getElementById('status').innerText = "LINK ESTABLISHED"; });
        conn.on('data', data => {
            if (data.type === 'PAUSE_REQ') isPaused = true;
            else if (data.type === 'RESUME') isPaused = false;
            else if (isHost) { p2.x = data.x; p2.y = data.y; }
            else { Object.assign(p1, data.p1); Object.assign(puck, data.puck); scores = data.scores; currentRound = data.round; goalY = data.goalY; }
        });
    }

    function handleInput(e) {
        if (!gameActive || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        const pos = { x: (e.clientX || e.touches[0].clientX) - rect.left, y: (e.clientY || e.touches[0].clientY) - rect.top };
        
        if (isHost || isOffline) {
            p1.x = Math.max(p1.radius, Math.min(pos.x, centerX - p1.radius - 5));
            p1.y = Math.max(p1.radius, Math.min(pos.y, canvas.height - p1.radius));
            if (currentRound === 2) applyCircleConstraint(p1, "left");
            p1.vx = p1.x - p1.lastX; p1.vy = p1.y - p1.lastY;
            p1.lastX = p1.x; p1.lastY = p1.y;
        } else {
            p2.x = Math.max(centerX + p2.radius + 5, Math.min(pos.x, canvas.width - p2.radius));
            p2.y = Math.max(p2.radius, Math.min(pos.y, canvas.height - p2.radius));
            if (currentRound === 2) applyCircleConstraint(p2, "right");
            if (conn?.open) conn.send({ x: p2.x, y: p2.y });
        }
    }

    function applyCircleConstraint(p, side) {
        let dx = p.x - centerX, dy = p.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - p.radius) {
            let angle = Math.atan2(dy, dx);
            p.x = centerX + Math.cos(angle) * (tableRadius - p.radius);
            p.y = centerY + Math.sin(angle) * (tableRadius - p.radius);
        }
        p.x = (side === "left") ? Math.min(p.x, centerX - p.radius - 5) : Math.max(p.x, centerX + p.radius + 5);
    }

    function update() {
        if (isPaused) return;
        if (shakeIntensity > 0) shakeIntensity *= 0.9;
        surgeActiveTop = false; surgeActiveBottom = false;

        if (isOffline && gameActive && respawnTimer === 0) {
            let speed = aiDifficulty === "stalker" ? 0.18 : (aiDifficulty === "pro" ? 0.23 : 0.8);
            let targetX = (puck.x > centerX) ? puck.x : 850;
            p2.x += (targetX - p2.x) * speed;
            p2.y += (puck.y - p2.y) * speed;
            p2.x = Math.max(centerX + p2.radius + 5, Math.min(p2.x, canvas.width - p2.radius));
            p2.y = Math.max(p2.radius, Math.min(p2.y, canvas.height - p2.radius));
            if (currentRound === 2) applyCircleConstraint(p2, "right");
            p2.vx = p2.x - p2.lastX; p2.vy = p2.y - p2.lastY;
            p2.lastX = p2.x; p2.lastY = p2.y;
        }

        if (respawnTimer > 0) {
            respawnTimer--;
            if (respawnTimer === 0) { puck.dx = (Math.random() > 0.5 ? 5 : -5); puck.dy = (Math.random()-0.5)*5; }
            return;
        }

        if (currentRound === 2) {
            let dx = centerX - puck.x, dy = centerY - puck.y, dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 5) { puck.dx += (dx/dist) * 0.18; puck.dy += (dy/dist) * 0.18; }
        }

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        // Phase 1: Acceleration Zones (Visible)
        if (currentRound === 1) {
            if (puck.y < 40) {
                surgeActiveTop = true;
                puck.dx = (lastHitter === 1) ? Math.abs(puck.dx) * 2 : -Math.abs(puck.dx) * 2;
                shakeIntensity = 5;
            } else if (puck.y > 560) {
                surgeActiveBottom = true;
                puck.dx = (lastHitter === 1) ? Math.abs(puck.dx) * 2 : -Math.abs(puck.dx) * 2;
                shakeIntensity = 5;
            }
        }

        if (currentRound === 2) updateCirclePhysics(); else updateRectPhysics();

        checkCol(p1, 1); checkCol(p2, 2);
        updateUI(); if(!isOffline && isHost) sync();
    }

    function checkCol(p, id) {
        let dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < p.radius + puck.radius) {
            lastHitter = id;
            let nx = dx/dist, ny = dy/dist;
            puck.x = p.x + nx * (p.radius + puck.radius);
            puck.y = p.y + ny * (p.radius + puck.radius);
            let v = (puck.dx - p.vx) * nx + (puck.dy - p.vy) * ny;
            if (v < 0) { puck.dx -= 2.1 * v * nx; puck.dy -= 2.1 * v * ny; }
        }
    }

    function updateRectPhysics() {
        if (currentRound === 3) {
            goalY += 6 * goalDir;
            if (goalY > canvas.height - goalHeight || goalY < 0) goalDir *= -1;
        }
        const gT = (currentRound === 3) ? goalY : (canvas.height - goalHeight)/2;
        const gB = gT + goalHeight;
        const bounce = (currentRound === 3) ? -0.95 : -0.8;

        if (puck.y < puck.radius || puck.y > canvas.height - puck.radius) { puck.dy *= bounce; puck.y = puck.y < puck.radius ? puck.radius : canvas.height - puck.radius; }
        if (puck.x < puck.radius) {
            if (puck.y > gT && puck.y < gB) score(2);
            else { puck.dx *= bounce; puck.x = puck.radius; }
        } else if (puck.x > canvas.width - puck.radius) {
            if (puck.y > gT && puck.y < gB) score(1);
            else { puck.dx *= bounce; puck.x = canvas.width - puck.radius; }
        }
    }

    function updateCirclePhysics() {
        let dx = puck.x - centerX, dy = puck.y - centerY, dist = Math.sqrt(dx*dx+dy*dy);
        if (dist > tableRadius - puck.radius) {
            let angle = Math.atan2(dy, dx), deg = angle * 180 / Math.PI;
            if (Math.abs(deg) < 20) score(1);
            else if (Math.abs(deg) > 160) score(2);
            else {
                let normalX = dx/dist, normalY = dy/dist;
                let dot = puck.dx * normalX + puck.dy * normalY;
                puck.dx -= 2 * dot * normalX; puck.dy -= 2 * dot * normalY;
                puck.x = centerX + normalX * (tableRadius - puck.radius);
                puck.y = centerY + normalY * (tableRadius - puck.radius);
            }
        }
    }

    function score(p) { p === 1 ? scores.p1++ : scores.p2++; shakeIntensity = 15; resetPuck(); }

    function resetPuck() {
        puck.x = centerX; puck.y = centerY; puck.dx = 0; puck.dy = 0;
        if (scores.p1 >= WIN_SCORE || scores.p2 >= WIN_SCORE) nextRound();
        else respawnTimer = 100;
    }

    function nextRound() {
        seriesPoints[scores.p1 > scores.p2 ? 'p1' : 'p2']++;
        if (seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN) {
            gameActive = false; document.getElementById('overlay').style.display = 'block';
            document.getElementById('winner-text').innerText = scores.p1 > scores.p2 ? "PLAYER 1 WINS!" : "PLAYER 2 WINS!";
        } else {
            currentRound++; scores = {p1:0, p2:0}; resetPuck();
        }
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1; document.getElementById('s2').innerText = scores.p2;
        document.getElementById('round-num').innerText = currentRound;
        document.getElementById('table-type').innerText = MAP_NAMES[currentRound-1];
        const dot = (id, pts) => {
            let h = ""; for(let i=0; i<SERIES_TO_WIN; i++) h += `<span class="${i<pts?'won':''}">●</span> `;
            document.getElementById(id).innerHTML = h;
        };
        dot('series-p1', seriesPoints.p1); dot('series-p2', seriesPoints.p2);
    }

    function sync() { conn?.send({ p1, puck, scores, round: currentRound, goalY }); }
    function requestPause() { isPaused = !isPaused; conn?.send({ type: isPaused ? 'PAUSE_REQ' : 'RESUME' }); updateUI(); }
    function resumeGame() { isPaused = false; conn?.send({ type: 'RESUME' }); }

    function draw() {
        ctx.save(); if(shakeIntensity > 0) ctx.translate(Math.random()*shakeIntensity, Math.random()*shakeIntensity);
        ctx.fillStyle = '#050505'; ctx.fillRect(0,0,1000,600);
        
        // --- DRAW VISIBLE ACCELERATION ZONES ---
        if (currentRound === 1) {
            // Shadow blur for neon glow effect
            ctx.shadowBlur = surgeActiveTop ? 25 : 10;
            ctx.shadowColor = '#0ff';
            ctx.fillStyle = surgeActiveTop ? 'rgba(0, 255, 255, 0.25)' : 'rgba(0, 255, 255, 0.1)';
            ctx.fillRect(0, 0, 1000, 40); // Top Surge

            ctx.shadowBlur = surgeActiveBottom ? 25 : 10;
            ctx.fillStyle = surgeActiveBottom ? 'rgba(0, 255, 255, 0.25)' : 'rgba(0, 255, 255, 0.1)';
            ctx.fillRect(0, 560, 1000, 40); // Bottom Surge
            
            // Neon accent lines
            ctx.shadowBlur = 10;
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 40); ctx.lineTo(1000, 40);
            ctx.moveTo(0, 560); ctx.lineTo(1000, 560);
            ctx.stroke();
            ctx.restore(); // Important to clear shadow before drawing rest
        }
        
        if (currentRound === 2) {
            ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, 0, Math.PI*2);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 5; ctx.stroke();
        } else {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 5; ctx.strokeRect(5,5,990,590);
            const gT = (currentRound === 3) ? goalY : (canvas.height - goalHeight)/2;
            ctx.fillStyle = '#0ff'; ctx.fillRect(0, gT, 5, goalHeight);
            ctx.fillStyle = '#f0f'; ctx.fillRect(995, gT, 5, goalHeight);
        }

        ctx.setLineDash([10,10]); ctx.strokeStyle = '#111'; ctx.beginPath(); ctx.moveTo(500,0); ctx.lineTo(500,600); ctx.stroke(); ctx.setLineDash([]);
        
        // Reset shadow blurring for standard objects
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
        
        const drawP = (p) => {
            ctx.fillStyle = p.color; ctx.shadowColor = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        };
        drawP(p1); drawP(p2);
        
        if (respawnTimer > 0) {
            ctx.fillStyle = "#fff"; ctx.font = "bold 50px Arial"; ctx.textAlign = "center";
            ctx.fillText(Math.ceil(respawnTimer/30), 500, 315);
        }
        ctx.restore(); 
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, {passive:false});
</script>
</body>
</html>
