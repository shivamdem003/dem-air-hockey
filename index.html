<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Demkey</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333; display: flex; gap: 10px; align-items: center; z-index: 10; }
        canvas { background: #000; cursor: none; }
        .hud { display: flex; justify-content: space-between; width: 800px; align-items: center; margin-bottom: 5px; }
        .score { font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 5px #0ff; min-width: 60px; text-align: center; }
        .series-dots { font-size: 1.5rem; letter-spacing: 5px; color: #222; }
        .series-dots .won { color: #0ff; text-shadow: 0 0 5px #0ff; }
        .series-dots.p2 .won { color: #f0f; text-shadow: 0 0 5px #f0f; }
        .round-display { font-size: 1rem; color: #aaa; background: #111; padding: 5px 20px; border-radius: 4px; border: 1px solid #333; text-transform: uppercase; letter-spacing: 2px; }
        button { background: #0ff; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 2px; transition: 0.2s; color: #000; }
        button:hover { background: #fff; }
        input { background: #111; border: 1px solid #333; color: white; padding: 8px; border-radius: 2px; outline: none; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 50px; border-radius: 4px; text-align: center; border: 1px solid #0ff; display: none; z-index: 100; }
        #status { color: #444; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="menu">
        <div style="font-size: 0.9rem;">ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">CONNECT</button>
    </div>

    <div class="hud">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s1">0</div>
            <div id="series-p1" class="series-dots">● ●</div>
        </div>
        <div class="round-display"><span id="table-type">ACCELERATOR PACE</span></div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s2" style="color:#f0f; text-shadow: 0 0 5px #f0f;">0</div>
            <div id="series-p2" class="series-dots p2">● ●</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="status">Waiting for connection...</div>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 2.5rem; letter-spacing: 4px;">PLAYER 1 WINS!</h1>
        <p id="sub-text" style="color: #666; font-size: 1rem; margin-top: 10px;">PREPARING NEXT ROUND...</p>
        <button id="restart-btn" style="display:none; margin-top:20px;" onclick="resetFullMatch()">PLAY NEW SERIES</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    let isHost = false;
    let gameActive = true;

    // Table Constants
    const centerX = 400, centerY = 300;
    const tableW = 700, tableH = 450; // Standard Rectangle Size
    const tableLeft = (800 - tableW)/2;
    const tableRight = tableLeft + tableW;
    const tableTop = (600 - tableH)/2;
    const tableBottom = tableTop + tableH;
    
    const tableRadius = 260; // Round 2 Circle Size
    const goalHeight = 140;
    const WIN_SCORE = 13;
    const SERIES_TO_WIN = 2;
    
    // State
    let currentRound = 1;
    let scores = { p1: 0, p2: 0 };
    let seriesPoints = { p1: 0, p2: 0 };
    let respawnTimer = 0;

    const puck = { x: 400, y: 300, dx: 0, dy: 0, radius: 14, friction: 0.995 };
    const p1 = { x: 200, y: 300, radius: 28, color: '#0ff' };
    const p2 = { x: 600, y: 300, radius: 28, color: '#f0f' };
    
    let goalY = tableTop + (tableH - goalHeight) / 2;
    let goalDir = 1;

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isHost = true; setupConnection(); });

    function connectToFriend() {
        conn = peer.connect(document.getElementById('remote-id').value);
        isHost = false;
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "Status: Connected!";
            gameLoop();
            if(isHost) resetPuck();
        });

        conn.on('data', data => {
            if (isHost) {
                p2.x = data.x; p2.y = data.y;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y;
                puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores;
                seriesPoints = data.series;
                currentRound = data.round;
                gameActive = data.gameActive;
                goalY = data.goalY;
                respawnTimer = data.respawnTimer;
                updateUI();
            }
        });
    }

    canvas.addEventListener('mousemove', e => {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if (isHost) {
            p1.x = Math.max(tableLeft + p1.radius, Math.min(mx, centerX - p1.radius));
            p1.y = Math.max(tableTop + p1.radius, Math.min(my, tableBottom - p1.radius));
            if (currentRound === 2) applyCircleConstraint(p1);
        } else {
            p2.x = Math.max(centerX + p2.radius, Math.min(mx, tableRight - p2.radius));
            p2.y = Math.max(tableTop + p2.radius, Math.min(my, tableBottom - p2.radius));
            if (currentRound === 2) applyCircleConstraint(p2);
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    });

    function applyCircleConstraint(p) {
        let dx = p.x - centerX, dy = p.y - centerY;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - p.radius) {
            let angle = Math.atan2(dy, dx);
            p.x = centerX + Math.cos(angle) * (tableRadius - p.radius);
            p.y = centerY + Math.sin(angle) * (tableRadius - p.radius);
        }
    }

    function update() {
        if (!isHost || !gameActive) return;

        if (respawnTimer > 0) {
            respawnTimer--;
            if (respawnTimer === 0) {
                puck.dx = (Math.random() > 0.5 ? 7 : -7);
                puck.dy = (Math.random() - 0.5) * 10;
            }
            syncData();
            return;
        }

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        if (currentRound === 2) updateCirclePhysics();
        else updateRectPhysics();

        checkCollision(p1, puck);
        checkCollision(p2, puck);
        updateUI();
        syncData();
    }

    function syncData() {
        if (conn && conn.open) {
            conn.send({ p1, puck, scores, series: seriesPoints, round: currentRound, gameActive, goalY, respawnTimer });
        }
    }

    function updateRectPhysics() {
        if (currentRound === 1) {
            const pX = 350, pW = 100;
            if (puck.y < tableTop + puck.radius && puck.x > pX && puck.x < pX + pW) {
                puck.dy = 12; puck.y = tableTop + puck.radius + 10;
            } else if (puck.y > tableBottom - puck.radius && puck.x > pX && puck.x < pX + pW) {
                puck.dy = -12; puck.y = tableBottom - puck.radius - 10;
            }
        }
        
        if (currentRound >= 3) {
            goalY += 4 * goalDir;
            if (goalY > tableBottom - goalHeight || goalY < tableTop) goalDir *= -1;
        }

        const gT = (currentRound >= 3) ? goalY : tableTop + (tableH - goalHeight)/2;
        const gB = gT + goalHeight;

        // Top/Bottom walls
        if (puck.y < tableTop + puck.radius) { puck.y = tableTop + puck.radius; puck.dy *= -1; }
        else if (puck.y > tableBottom - puck.radius) { puck.y = tableBottom - puck.radius; puck.dy *= -1; }

        // Left/Right walls & goals
        if (puck.x < tableLeft + puck.radius) {
            if (puck.y > gT && puck.y < gB) { scores.p2++; resetPuck(); }
            else { puck.x = tableLeft + puck.radius; puck.dx *= -1; }
        } else if (puck.x > tableRight - puck.radius) {
            if (puck.y > gT && puck.y < gB) { scores.p1++; resetPuck(); }
            else { puck.x = tableRight - puck.radius; puck.dx *= -1; }
        }
    }

    function updateCirclePhysics() {
        let dx = puck.x - centerX, dy = puck.y - centerY;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 180) { puck.dx += dx * 0.0015; puck.dy -= dy * 0.0015; }
        if (dist > tableRadius - puck.radius) {
            let angle = Math.atan2(dy, dx), deg = angle * (180 / Math.PI);
            if (Math.abs(deg) < 18) { scores.p1++; resetPuck(); }
            else if (Math.abs(deg) > 162) { scores.p2++; resetPuck(); }
            else {
                let speed = Math.sqrt(puck.dx**2 + puck.dy**2);
                let reflectionAngle = 2 * angle - Math.atan2(puck.dy, puck.dx) + Math.PI;
                puck.dx = Math.cos(reflectionAngle) * speed;
                puck.dy = Math.sin(reflectionAngle) * speed;
                puck.x = centerX + Math.cos(angle) * (tableRadius - puck.radius - 2);
                puck.y = centerY + Math.sin(angle) * (tableRadius - puck.radius - 2);
            }
        }
    }

    function checkCollision(paddle, pk) {
        let dx = pk.x - paddle.x, dy = pk.y - paddle.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < paddle.radius + pk.radius) {
            let angle = Math.atan2(dy, dx);
            let speed = Math.sqrt(pk.dx**2 + pk.dy**2) + 2.5;
            pk.dx = Math.cos(angle) * Math.min(speed, 20);
            pk.dy = Math.sin(angle) * Math.min(speed, 20);
            pk.x = paddle.x + Math.cos(angle) * (paddle.radius + pk.radius + 1);
            pk.y = paddle.y + Math.sin(angle) * (paddle.radius + pk.radius + 1);
        }
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;
        const labels = ["WARP PIPES", "GRAVITY COLOSSEUM", "SHIFTING GATES"];
        document.getElementById('table-type').innerText = labels[currentRound-1] || "FINAL";
        const renderDots = (id, pts) => {
            let dots = "";
            for(let i=0; i<SERIES_TO_WIN; i++) dots += `<span class="${i < pts ? 'won' : ''}">●</span> `;
            document.getElementById(id).innerHTML = dots;
        };
        renderDots('series-p1', seriesPoints.p1);
        renderDots('series-p2', seriesPoints.p2);
        document.getElementById('overlay').style.display = gameActive ? 'none' : 'block';
    }

    function resetPuck() {
        puck.x = centerX; puck.y = centerY; puck.dx = 0; puck.dy = 0;
        if(isHost && scores.p1 >= WIN_SCORE) startNewRound("PLAYER 1");
        else if(isHost && scores.p2 >= WIN_SCORE) startNewRound("PLAYER 2");
        else respawnTimer = 150;
    }

    function startNewRound(winner) {
        gameActive = false;
        seriesPoints[winner === "PLAYER 1" ? 'p1' : 'p2']++;
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
        document.getElementById('winner-text').innerText = winner + (isMatchOver ? " MATCH WIN!" : " ROUND WIN!");
        if (isMatchOver && isHost) document.getElementById('restart-btn').style.display = 'inline-block';
        updateUI();
        if (!isMatchOver) {
            setTimeout(() => { scores = {p1:0, p2:0}; currentRound++; gameActive = true; resetPuck(); updateUI(); }, 3000);
        }
    }

    function resetFullMatch() {
        seriesPoints = { p1: 0, p2: 0 }; scores = { p1: 0, p2: 0 };
        currentRound = 1; gameActive = true;
        document.getElementById('restart-btn').style.display = 'none';
        resetPuck(); updateUI();
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (currentRound === 2) {
            ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 4; ctx.stroke();
            ctx.lineWidth = 10;
            ctx.strokeStyle = '#0ff'; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, -0.2, 0.2); ctx.stroke();
            ctx.strokeStyle = '#f0f'; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, Math.PI - 0.2, Math.PI + 0.2); ctx.stroke();
        } else {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
            ctx.strokeRect(tableLeft, tableTop, tableW, tableH);
            const gY = (currentRound >= 3) ? goalY : tableTop + (tableH - goalHeight)/2;
            ctx.fillStyle = '#0ff'; ctx.fillRect(tableLeft-4, gY, 6, goalHeight);
            ctx.fillStyle = '#f0f'; ctx.fillRect(tableRight-2, gY, 6, goalHeight);
        }

        if (currentRound === 1) {
            ctx.fillStyle = '#0f0'; 
            ctx.fillRect(350, tableTop-5, 100, 10); ctx.fillRect(350, tableBottom-5, 100, 10);
        }

        ctx.setLineDash([10, 10]); ctx.strokeStyle = '#151515';
        ctx.beginPath(); ctx.moveTo(centerX, tableTop); ctx.lineTo(centerX, tableBottom); ctx.stroke();
        ctx.setLineDash([]);

        ctx.shadowBlur = 8; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
        
        drawP(p1); drawP(p2);

        if (respawnTimer > 0) {
            ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.font = "bold 60px 'Segoe UI'";
            ctx.fillText(Math.ceil(respawnTimer / 60), centerX, centerY + 20);
        }
    }

    function drawP(p) {
        ctx.shadowBlur = 12; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
