<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey Pro - Invisible Striker Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; display: flex; gap: 15px; align-items: center; z-index: 10; }
        canvas { border: 2px solid #222; background: #000; cursor: none; box-shadow: 0 0 30px rgba(0,255,255,0.05); }
        .hud { display: flex; justify-content: space-between; width: 1000px; align-items: center; margin-bottom: 20px; }
        .score { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 10px #0ff; min-width: 80px; text-align: center; }
        .round-display { text-align: center; color: #ccc; background: rgba(255,255,255,0.03); padding: 12px 50px; border-radius: 15px; border: 1px solid #333; }
        button { background: #0ff; border: none; padding: 8px 18px; cursor: pointer; font-weight: bold; border-radius: 4px; color: #000; }
        button:disabled { background: #222; color: #444; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.96); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #0ff; display: none; z-index: 100; min-width: 400px; }
        input { background: #111; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="menu">
        <div>ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Paste Friend's ID">
        <button onclick="network.connect()">Connect</button>
        <button id="pause-btn" onclick="game.requestPause()">Pause</button>
    </div>

    <div class="hud">
        <div class="score" id="s1">0</div>
        <div class="round-display">
            <div style="font-size: 0.8rem; color: #888;">ROUND <span id="round-num">1</span></div>
            <strong id="table-type">PHANTOM STRIKE</strong>
        </div>
        <div class="score" id="s2" style="color:#f0f; text-shadow: 0 0 10px #f0f;">0</div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <div id="overlay">
        <h1 id="winner-text">-</h1>
        <p id="sub-text">Preparing...</p>
        <button id="restart-btn" style="display:none;" onclick="location.reload()">New Session</button>
    </div>

<script>
const CONFIG = {
    CANVAS_WIDTH: 1000,
    CANVAS_HEIGHT: 600,
    PADDLE_RADIUS: 32,
    PUCK_RADIUS: 15,
    GOAL_HEIGHT: 160,
    WIN_SCORE: 13,
    FRICTION: 0.993,
    MAX_SPEED: 23
};

class Paddle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.radius = CONFIG.PADDLE_RADIUS;
        this.color = color;
    }

    draw(ctx) {
        ctx.save();
        ctx.shadowBlur = 15; ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

class Puck {
    constructor() {
        this.reset();
        this.radius = CONFIG.PUCK_RADIUS;
    }

    reset() {
        this.x = CONFIG.CANVAS_WIDTH / 2;
        this.y = CONFIG.CANVAS_HEIGHT / 2;
        this.dx = 0; this.dy = 0;
    }

    update() {
        this.x += this.dx;
        this.y += this.dy;
        this.dx *= CONFIG.FRICTION;
        this.dy *= CONFIG.FRICTION;
    }

    draw(ctx) {
        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.p1 = new Paddle(150, 300, '#0ff');
        this.p2 = new Paddle(850, 300, '#f0f');
        this.puck = new Puck();
        
        this.state = {
            scores: { p1: 0, p2: 0 },
            active: false,
            paused: false,
            respawnTimer: 0
        };

        this.initListeners();
    }

    initListeners() {
        this.canvas.addEventListener('mousemove', (e) => {
            if (!this.state.active || this.state.paused) return;
            const rect = this.canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            if (network.isHost) {
                this.p1.vx = mx - this.p1.x; this.p1.vy = my - this.p1.y;
                this.p1.x = Math.min(mx, CONFIG.CANVAS_WIDTH/2 - this.p1.radius);
                this.p1.y = Math.max(this.p1.radius, Math.min(CONFIG.CANVAS_HEIGHT - this.p1.radius, my));
            } else {
                this.p2.x = Math.max(mx, CONFIG.CANVAS_WIDTH/2 + this.p2.radius);
                this.p2.y = Math.max(this.p2.radius, Math.min(CONFIG.CANVAS_HEIGHT - this.p2.radius, my));
                network.send({ type: 'MOVE', x: this.p2.x, y: this.p2.y });
            }
        });
    }

    update() {
        if (!this.state.active || this.state.paused || !network.isHost) return;

        if (this.state.respawnTimer > 0) {
            this.state.respawnTimer--;
            if (this.state.respawnTimer === 0) {
                this.puck.dx = (Math.random() > 0.5 ? 5 : -5);
                this.puck.dy = (Math.random() - 0.5) * 6;
            }
            return;
        }

        this.puck.update();
        this.handlePhysics();
        network.sync(this.state, this.p1, this.puck);
    }

    handlePhysics() {
        const goalTop = (CONFIG.CANVAS_HEIGHT - CONFIG.GOAL_HEIGHT) / 2;
        const goalBottom = goalTop + CONFIG.GOAL_HEIGHT;

        // Wall Bounces
        if (this.puck.y < this.puck.radius || this.puck.y > CONFIG.CANVAS_HEIGHT - this.puck.radius) this.puck.dy *= -1;

        if (this.puck.x < this.puck.radius) {
            if (this.puck.y > goalTop && this.puck.y < goalBottom) this.scoreGoal(2);
            else { this.puck.x = this.puck.radius; this.puck.dx *= -1; }
        } else if (this.puck.x > CONFIG.CANVAS_WIDTH - this.puck.radius) {
            if (this.puck.y > goalTop && this.puck.y < goalBottom) this.scoreGoal(1);
            else { this.puck.x = CONFIG.CANVAS_WIDTH - this.puck.radius; this.puck.dx *= -1; }
        }

        this.collide(this.p1);
        this.collide(this.p2);
    }

    collide(paddle) {
        let dx = this.puck.x - paddle.x, dy = this.puck.y - paddle.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < paddle.radius + this.puck.radius) {
            let angle = Math.atan2(dy, dx);
            let speed = Math.sqrt(this.puck.dx**2 + this.puck.dy**2) + 3;
            this.puck.dx = Math.cos(angle) * Math.min(speed, CONFIG.MAX_SPEED);
            this.puck.dy = Math.sin(angle) * Math.min(speed, CONFIG.MAX_SPEED);
            const overlap = (paddle.radius + this.puck.radius) - dist;
            this.puck.x += Math.cos(angle) * (overlap + 2);
            this.puck.y += Math.sin(angle) * (overlap + 2);
        }
    }

    scoreGoal(playerNum) {
        this.state.scores['p' + playerNum]++;
        this.puck.reset();
        this.state.respawnTimer = 100;
        document.getElementById('s1').innerText = this.state.scores.p1;
        document.getElementById('s2').innerText = this.state.scores.p2;
    }

    render() {
        // FIXED: Clear the canvas every frame to remove trails
        this.ctx.fillStyle = '#050505';
        this.ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
        
        // Arena lines
        this.ctx.strokeStyle = '#1a1a1a';
        this.ctx.setLineDash([10, 10]);
        this.ctx.beginPath(); this.ctx.moveTo(500, 0); this.ctx.lineTo(500, 600); this.ctx.stroke();
        this.ctx.setLineDash([]);

        this.puck.draw(this.ctx);

        // FIXED: Only draw the OPPONENT'S paddle
        if (network.isHost) {
            this.p2.draw(this.ctx); // Host sees Client
        } else {
            this.p1.draw(this.ctx); // Client sees Host
        }

        if (this.state.respawnTimer > 0) {
            this.ctx.fillStyle = "#fff";
            this.ctx.font = "bold 40px Segoe UI";
            this.ctx.textAlign = "center";
            this.ctx.fillText("PREPARE", 500, 300);
        }
    }

    requestPause() {
        this.state.paused = !this.state.paused;
        network.send({ type: 'PAUSE_SYNC', paused: this.state.paused });
    }
}

class NetworkManager {
    constructor() {
        this.peer = new Peer();
        this.conn = null;
        this.isHost = false;
        this.peer.on('open', id => document.getElementById('my-id').innerText = id);
        this.peer.on('connection', c => { this.conn = c; this.isHost = true; this.setup(); });
    }

    connect() {
        const id = document.getElementById('remote-id').value;
        this.conn = this.peer.connect(id);
        this.isHost = false;
        this.setup();
    }

    setup() {
        this.conn.on('open', () => {
            game.state.active = true;
            this.loop();
        });
        this.conn.on('data', data => {
            if (data.type === 'SYNC') {
                game.p1.x = data.p1.x; game.p1.y = data.p1.y;
                game.puck.x = data.puck.x; game.puck.y = data.puck.y;
                game.state = data.state;
                document.getElementById('s1').innerText = game.state.scores.p1;
                document.getElementById('s2').innerText = game.state.scores.p2;
            } else if (data.type === 'MOVE') {
                game.p2.x = data.x; game.p2.y = data.y;
            } else if (data.type === 'PAUSE_SYNC') {
                game.state.paused = data.paused;
            }
        });
        this.conn.on('close', () => {
            game.state.active = false;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('winner-text').innerText = "MATCH CONCLUDED";
            document.getElementById('restart-btn').style.display = 'block';
        });
    }

    send(data) { if (this.conn && this.conn.open) this.conn.send(data); }

    sync(state, p1, puck) {
        this.send({ type: 'SYNC', state, p1: {x: p1.x, y: p1.y}, puck: {x: puck.x, y: puck.y} });
    }

    loop() {
        game.update();
        game.render();
        requestAnimationFrame(() => this.loop());
    }
}

const game = new GameEngine();
const network = new NetworkManager();
</script>
</body>
</html>
