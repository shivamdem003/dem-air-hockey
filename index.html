<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey - Best of 3</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #222; padding: 12px; border-radius: 12px; border: 1px solid #0ff; display: flex; gap: 10px; align-items: center; z-index: 10; }
        canvas { border: 4px solid #444; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); cursor: none; box-shadow: 0 0 30px rgba(0,255,255,0.1); }
        .hud { display: flex; justify-content: space-between; width: 800px; align-items: center; margin-bottom: 5px; }
        .score { font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 10px #0ff; min-width: 60px; text-align: center; }
        .series-dots { font-size: 1.5rem; letter-spacing: 5px; color: #444; }
        .series-dots .won { color: #0ff; text-shadow: 0 0 10px #0ff; }
        .series-dots.p2 .won { color: #f0f; text-shadow: 0 0 10px #f0f; }
        .round-display { font-size: 1.2rem; color: #fff; background: #333; padding: 5px 20px; border-radius: 20px; border: 1px solid #0ff; }
        button { background: #0ff; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.3s; color: #000; }
        button:hover { background: #fff; box-shadow: 0 0 15px #0ff; }
        input { background: #333; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; outline: none; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 50px; border-radius: 20px; text-align: center; border: 3px solid #0ff; display: none; z-index: 100; }
        #status { color: #888; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div id="menu">
        <div>My ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
    </div>

    <div class="hud">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s1">0</div>
            <div id="series-p1" class="series-dots">● ●</div>
        </div>
        
        <div class="round-display">ROUND <span id="round-num">1</span></div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s2" style="color:#f0f; text-shadow: 0 0 10px #f0f;">0</div>
            <div id="series-p2" class="series-dots p2">● ●</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="status">Waiting for connection...</div>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 3rem;">PLAYER 1 WINS!</h1>
        <p id="sub-text" style="color: #fff; font-size: 1.2rem;">Next round starting...</p>
        <button id="restart-btn" style="display:none; margin-top:20px;" onclick="resetFullMatch()">Play New Series</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    let isHost = false;
    let gameActive = true;

    // Game Constants
    const goalHeight = 160;
    const goalTop = (canvas.height - goalHeight) / 2;
    const goalBottom = goalTop + goalHeight;
    const WIN_SCORE = 13;
    const SERIES_TO_WIN = 2; // Best of 3 means first to 2
    
    // Game State
    let currentRound = 1;
    let scores = { p1: 0, p2: 0 };
    let seriesPoints = { p1: 0, p2: 0 };
    const puck = { x: 400, y: 250, dx: 0, dy: 0, radius: 15, friction: 0.985 };
    const p1 = { x: 100, y: 250, radius: 30, color: '#0ff' };
    const p2 = { x: 700, y: 250, radius: 30, color: '#f0f' };

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isHost = true; setupConnection(); });

    function connectToFriend() {
        conn = peer.connect(document.getElementById('remote-id').value);
        isHost = false;
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "Status: Connected!";
            if(isHost) { resetPuck(); gameLoop(); }
        });
        conn.on('data', data => {
            if (isHost) { p2.x = data.x; p2.y = data.y; } 
            else {
                p1.x = data.p1.x; p1.y = data.p1.y;
                puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores;
                seriesPoints = data.series;
                currentRound = data.round;
                gameActive = data.gameActive;
                updateUI();
                if (gameActive) gameLoop();
            }
        });
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;
        document.getElementById('round-num').innerText = currentRound;
        
        // Update Series Dots
        const renderDots = (id, points) => {
            let dots = "";
            for(let i=0; i<SERIES_TO_WIN; i++) dots += `<span class="${i < points ? 'won' : ''}">●</span> `;
            document.getElementById(id).innerHTML = dots;
        };
        renderDots('series-p1', seriesPoints.p1);
        renderDots('series-p2', seriesPoints.p2);

        document.getElementById('overlay').style.display = gameActive ? 'none' : 'block';
    }

    function resetPuck() {
        puck.x = 400; puck.y = 250;
        puck.dx = (Math.random() > 0.5 ? 5 : -5);
        puck.dy = (Math.random() - 0.5) * 8;
    }

    function resetFullMatch() {
        seriesPoints = { p1: 0, p2: 0 };
        currentRound = 1;
        scores = { p1: 0, p2: 0 };
        gameActive = true;
        document.getElementById('restart-btn').style.display = 'none';
        resetPuck();
        updateUI();
    }

    function startNewRound(winnerName) {
        gameActive = false;
        const pKey = (winnerName === "PLAYER 1") ? 'p1' : 'p2';
        seriesPoints[pKey]++;
        
        const isMatchOver = seriesPoints[pKey] >= SERIES_TO_WIN;
        
        document.getElementById('winner-text').innerText = isMatchOver ? winnerName + " WINS THE MATCH!" : winnerName + " WINS THE ROUND!";
        document.getElementById('winner-text').style.color = (pKey === 'p1') ? "#0ff" : "#f0f";
        document.getElementById('sub-text').innerText = isMatchOver ? "Series Complete" : "Next round starting in 3 seconds...";
        
        if (isMatchOver && isHost) {
            document.getElementById('restart-btn').style.display = 'inline-block';
        }

        updateUI();
        
        if (!isMatchOver) {
            setTimeout(() => {
                scores.p1 = 0; scores.p2 = 0;
                currentRound++;
                gameActive = true;
                resetPuck();
                updateUI();
            }, 3000);
        }
    }

    function update() {
        if (!isHost || !gameActive) return;

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        // Wall collisions
        if (puck.y < puck.radius) { puck.y = puck.radius; puck.dy *= -1; }
        else if (puck.y > canvas.height - puck.radius) { puck.y = canvas.height - puck.radius; puck.dy *= -1; }

        if (puck.x < puck.radius) {
            if (puck.y > goalTop && puck.y < goalBottom) {
                scores.p2++; 
                if (scores.p2 >= WIN_SCORE) startNewRound("PLAYER 2");
                else resetPuck();
            } else { puck.x = puck.radius; puck.dx *= -1; }
        }
        
        if (puck.x > canvas.width - puck.radius) {
            if (puck.y > goalTop && puck.y < goalBottom) {
                scores.p1++;
                if (scores.p1 >= WIN_SCORE) startNewRound("PLAYER 1");
                else resetPuck();
            } else { puck.x = canvas.width - puck.radius; puck.dx *= -1; }
        }

        checkCollision(p1, puck);
        checkCollision(p2, puck);
        updateUI();
        if (conn && conn.open) conn.send({ p1, puck, scores, series: seriesPoints, round: currentRound, gameActive });
    }

    function checkCollision(paddle, pk) {
        let dx = pk.x - paddle.x;
        let dy = pk.y - paddle.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < paddle.radius + pk.radius) {
            let angle = Math.atan2(dy, dx);
            let speed = Math.sqrt(pk.dx**2 + pk.dy**2) + 3;
            pk.dx = Math.cos(angle) * Math.min(speed, 15);
            pk.dy = Math.sin(angle) * Math.min(speed, 15);
            pk.x = paddle.x + Math.cos(angle) * (paddle.radius + pk.radius + 2);
            pk.y = paddle.y + Math.sin(angle) * (paddle.radius + pk.radius + 2);
        }
    }

    canvas.addEventListener('mousemove', e => {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        if (isHost) {
            p1.x = Math.min(e.clientX - rect.left, canvas.width/2 - p1.radius);
            p1.y = Math.max(p1.radius, Math.min(canvas.height - p1.radius, e.clientY - rect.top));
        } else {
            p2.x = Math.max(e.clientX - rect.left, canvas.width/2 + p2.radius);
            p2.y = Math.max(p2.radius, Math.min(canvas.height - p2.radius, e.clientY - rect.top));
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#222'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(400, 250, 80, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(400, 0); ctx.lineTo(400, canvas.height); ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.strokeStyle = '#444'; ctx.strokeRect(-2, goalTop, 10, goalHeight);
        ctx.strokeRect(canvas.width - 8, goalTop, 10, goalHeight);

        ctx.shadowBlur = 15; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
        
        const drawP = (p) => {
            ctx.shadowBlur = 20; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        };
        drawP(p1); drawP(p2);
    }

    function gameLoop() {
        if (gameActive || isHost) { update(); draw(); requestAnimationFrame(gameLoop); }
    }
</script>
</body>
</html>
