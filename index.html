<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey - Pro Gravity Colosseum</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p1: #0ff; --p2: #f0f; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Layout & Scaling */
        #ui-layer { width: 95vw; max-width: 1000px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; z-index: 10; }
        #menu { background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        
        #game-area { position: relative; width: 95vw; max-width: 1000px; aspect-ratio: 1000 / 600; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        canvas { width: 100%; height: 100%; background: #000; border: 2px solid #222; display: block; touch-action: none; border-radius: 4px; }

        /* HUD */
        .hud { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; font-weight: 900; }
        .score { font-size: 2.2rem; text-shadow: 0 0 15px rgba(255,255,255,0.2); min-width: 50px; text-align: center; }
        .round-info { text-align: center; color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Form Elements */
        input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; width: 130px; font-size: 0.9rem; }
        button { background: var(--p1); color: #000; border: none; padding: 8px 16px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        /* Overlays */
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        .rank-text { font-size: 5rem; font-weight: 900; margin: 0; }
        .rank-s-plus { color: #fff; text-shadow: 0 0 20px var(--p1), 0 0 40px var(--p1); animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

        #status-bar { font-size: 0.7rem; color: #555; margin-top: 8px; text-transform: uppercase; }
        .copy-hint { font-size: 0.6rem; color: #0f0; margin-top: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud">
            <div id="s1" style="color:var(--p1)">0</div>
            <div class="round-info">Round <span id="round-num">1</span><br><b id="mode-text" style="color:white">Velocity Surge</b></div>
            <div id="s2" style="color:var(--p2)">0</div>
        </div>
        
        <div id="menu">
            <div style="text-align: center;">
                <div style="font-size: 0.7rem; color: #888;">YOUR ID (TAP TO COPY)</div>
                <div id="my-id" style="font-weight: bold; color: #0ff; cursor: pointer;">...</div>
            </div>
            <input type="text" id="remote-id" placeholder="PASTE FRIEND ID">
            <button onclick="connectToFriend()">Connect</button>
            <button style="background:#ffaa00" onclick="requestPause()">Pause</button>
        </div>
    </div>

    <div id="game-area">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div id="overlay">
            <h1 id="win-msg" style="margin:0">MATCH OVER</h1>
            <div id="final-rank" class="rank-text">S+</div>
            <p id="sub-msg" style="color:#888; margin: 10px 0 20px;">DOMINANT PERFORMANCE</p>
            <button onclick="resetFullMatch()" style="padding: 12px 24px; font-size: 1rem;">New Series</button>
        </div>
    </div>

    <div id="status-bar">Initializing Peer Engine...</div>

<script>
    // --- PEERJS SETUP ---
    const peer = new Peer({
        config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let conn, isHost = false, gameActive = true, isPaused = false;
    
    // Game Physics Constants
    const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 15, friction: 0.992 };
    const p1 = { x: 150, y: 300, radius: 35, color: '#0ff' };
    const p2 = { x: 850, y: 300, radius: 35, color: '#f0f' };
    let scores = { p1: 0, p2: 0 };
    let matchStats = { p1: { goals: 0, saves: 0, own: 0 }, p2: { goals: 0, saves: 0, own: 0 } };

    // --- CONNECTION HANDLERS ---
    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('status-bar').innerText = "Status: Online. Waiting for Peer.";
    });

    // Copy ID on click
    document.getElementById('my-id').onclick = () => {
        navigator.clipboard.writeText(document.getElementById('my-id').innerText);
        document.getElementById('status-bar').innerText = "ID Copied to Clipboard!";
        setTimeout(() => document.getElementById('status-bar').innerText = "Status: Online.", 2000);
    };

    peer.on('connection', c => {
        conn = c; isHost = true; setupDataSync();
    });

    function connectToFriend() {
        const id = document.getElementById('remote-id').value.trim();
        if(!id) return;
        conn = peer.connect(id);
        isHost = false;
        setupDataSync();
    }

    function setupDataSync() {
        conn.on('open', () => {
            document.getElementById('status-bar').innerText = "Status: Connected to Peer.";
            gameLoop();
        });
        conn.on('data', data => {
            if (isHost) {
                p2.x = data.x; p2.y = data.y;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y;
                puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores;
                updateUI();
            }
        });
    }

    // --- UNIVERSAL INPUT (Responsive) ---
    function handleInput(e) {
        if (!gameActive || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        // Accurate coordinate mapping across devices
        const mx = (clientX - rect.left) * (1000 / rect.width);
        const my = (clientY - rect.top) * (600 / rect.height);

        if (isHost) {
            p1.x = Math.max(p1.radius, Math.min(480, mx));
            p1.y = Math.max(p1.radius, Math.min(565, my));
        } else {
            p2.x = Math.max(520, Math.min(965, mx));
            p2.y = Math.max(p2.radius, Math.min(565, my));
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    }

    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e); }, { passive: false });

    // --- CORE ENGINE ---
    function update() {
        if (!isHost || !gameActive || isPaused) return;

        // Auto-start puck
        if (puck.dx === 0 && puck.dy === 0) { puck.dx = 6; puck.dy = 3; }

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        // Wall Bounces
        if (puck.y < 15 || puck.y > 585) puck.dy *= -1;

        // Goal logic
        if (puck.x < 0) { scores.p2++; resetPuck(); checkMatchEnd(); }
        if (puck.x > 1000) { scores.p1++; resetPuck(); checkMatchEnd(); }

        // Collision logic
        [p1, p2].forEach(p => {
            const dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < p.radius + puck.radius) {
                const angle = Math.atan2(dy, dx);
                const speed = 14;
                puck.dx = Math.cos(angle) * speed;
                puck.dy = Math.sin(angle) * speed;
            }
        });

        if (conn && conn.open) conn.send({ p1, puck, scores });
        updateUI();
    }

    function resetPuck() { puck.x = 500; puck.y = 300; puck.dx = 0; puck.dy = 0; }
    
    function checkMatchEnd() {
        if (scores.p1 >= 13 || scores.p2 >= 13) {
            gameActive = false;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('win-msg').innerText = scores.p1 >= 13 ? "PLAYER 1 WINS" : "PLAYER 2 WINS";
        }
    }

    function resetFullMatch() {
        scores = { p1: 0, p2: 0 };
        gameActive = true;
        document.getElementById('overlay').style.display = 'none';
        resetPuck();
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;
    }

    function draw() {
        // Field
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 1000, 600);
        ctx.strokeStyle = '#222'; ctx.lineWidth = 4; ctx.strokeRect(0,0,1000,600);
        ctx.beginPath(); ctx.moveTo(500,0); ctx.lineTo(500,600); ctx.stroke();
        
        // Puck
        ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, 15, 0, Math.PI*2); ctx.fill();
        
        // Paddles
        ctx.shadowBlur = 15; 
        ctx.shadowColor = p1.color; ctx.fillStyle = p1.color;
        ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI*2); ctx.fill();
        
        ctx.shadowColor = p2.color; ctx.fillStyle = p2.color;
        ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
