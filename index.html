<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey - Pro Gravity Colosseum</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; display: flex; gap: 15px; align-items: center; z-index: 10; }
        canvas { border: 2px solid #222; background: #000; cursor: none; box-shadow: 0 0 30px rgba(0,255,255,0.05); touch-action: none; }
        .hud { display: flex; justify-content: space-between; width: 1000px; max-width: 95vw; align-items: center; margin-bottom: 20px; }
        .score { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 10px #0ff; min-width: 80px; text-align: center; }
        .series-dots { font-size: 1.5rem; letter-spacing: 5px; color: #333; }
        .series-dots .won { color: #0ff; text-shadow: 0 0 8px #0ff; }
        .series-dots.p2 .won { color: #f0f; text-shadow: 0 0 8px #f0f; }
        .round-display { text-align: center; color: #ccc; background: rgba(255,255,255,0.03); padding: 12px 50px; border-radius: 15px; border: 1px solid #333; min-width: 300px; }
        #round-label { font-size: 1rem; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        #table-type { display: block; font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; }
        button { background: #0ff; border: none; padding: 8px 18px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s; color: #000; text-transform: uppercase; }
        button:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
        button:disabled { background: #222; color: #444; cursor: not-allowed; }
        #pause-btn { background: #ffaa00; }
        .pause-count { font-size: 0.8rem; color: #888; margin-left: 5px; }
        input { background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; outline: none; width: 150px; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.96); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #0ff; display: none; z-index: 100; min-width: 500px; }
        .stats-container { margin-top: 20px; width: 100%; border-top: 1px solid #333; padding-top: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 10px; align-items: center; }
        .stat-label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        .stat-val { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .p1-stat { color: #0ff !important; }
        .p2-stat { color: #f0f !important; }
        .rank-letter { font-size: 4rem; font-weight: 900; line-height: 1; margin: 5px 0; }
        .rank-s-plus { color: #ffffff; text-shadow: 0 0 15px #fff, 0 0 25px #0ff, 0 0 35px #0ff; animation: rankGlow 1.5s infinite alternate; }
        @keyframes rankGlow { from { text-shadow: 0 0 10px #fff, 0 0 20px #0ff; } to { text-shadow: 0 0 20px #fff, 0 0 40px #0ff, 0 0 50px #0ff; } }
        #status { color: #555; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="menu">
        <div>ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Paste ID">
        <button onclick="connectToFriend()">Connect</button>
        <button id="pause-btn" onclick="requestPause()">Pause</button>
        <div class="pause-count"><span id="p1-pauses">4</span> | <span id="p2-pauses">4</span></div>
    </div>

    <div class="hud">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s1">0</div>
            <div id="series-p1" class="series-dots">● ●</div>
        </div>
        <div class="round-display">
            <div id="round-label"><b>ROUND <span id="round-num">1</span></b></div>
            <span id="table-type">VELOCITY SURGE</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s2" style="color:#f0f; text-shadow: 0 0 10px #f0f;">0</div>
            <div id="series-p2" class="series-dots p2">● ●</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="status">Waiting for connection...</div>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 2.2rem;">-</h1>
        <p id="sub-text" style="color: #888; font-size: 1rem; margin-top: 5px;">Preparing arena...</p>
        <div id="stats-ui" class="stats-container" style="display:none;">
            <div class="stats-grid">
                <div class="rank-box"><div class="stat-label">Rank</div><div class="rank-letter" id="rank-p1">C</div></div>
                <div></div>
                <div class="rank-box"><div class="stat-label">Rank</div><div class="rank-letter" id="rank-p2">C</div></div>
                <div class="stat-val p1-stat" id="stat-p1-goals">0</div><div class="stat-label">Total Goals</div><div class="stat-val p2-stat" id="stat-p2-goals">0</div>
                <div class="stat-val p1-stat" id="stat-p1-saves">0</div><div class="stat-label">Critical Saves</div><div class="stat-val p2-stat" id="stat-p2-saves">0</div>
                <div class="stat-val p1-stat" id="stat-p1-own">0</div><div class="stat-label">Own Goals</div><div class="stat-val p2-stat" id="stat-p2-own">0</div>
            </div>
        </div>
        <div style="margin-top:25px; display: flex; gap:10px; justify-content: center;">
            <button id="resume-btn" style="display:none; background:#0f0;" onclick="resumeGame()">Resume</button>
            <button id="restart-btn" style="display:none;" onclick="resetFullMatch()">New Series</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), peer = new Peer();
    let conn, isHost = false, gameActive = true, isPaused = false, disconnected = false;
    
    const centerX = 500, centerY = 300, tableRadius = 280, goalHeight = 160, WIN_SCORE = 13, SERIES_TO_WIN = 2;
    let currentRound = 1, lastWinnerLabel = "", shakeIntensity = 0;
    let scores = { p1: 0, p2: 0 }, seriesPoints = { p1: 0, p2: 0 }, pausesLeft = { p1: 4, p2: 4 }, respawnTimer = 0, lastHitter = 0;
    let matchStats = { p1: { goals: 0, saves: 0, ownGoals: 0, rank: "C" }, p2: { goals: 0, saves: 0, ownGoals: 0, rank: "C" } };
    
    const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 15, friction: 0.993 };
    const p1 = { x: 150, y: 300, vx: 0, vy: 0, radius: 32, color: '#0ff' }, p2 = { x: 850, y: 300, vx: 0, vy: 0, radius: 32, color: '#f0f' };
    let goalY = (canvas.height - goalHeight) / 2, goalDir = 1;

    const roundNames = ["VELOCITY SURGE", "ORBITAL COLISEUM", "MOVING OVERDRIVE"];
    const pipes = [
        { x: 500, y: 120, w: 180, h: 40, target: "right" },
        { x: 500, y: 480, w: 180, h: 40, target: "left" }
    ];

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isHost = true; setupConnection(); });

    function connectToFriend() {
        const id = document.getElementById('remote-id').value;
        if (id) { conn = peer.connect(id); isHost = false; setupConnection(); }
    }

    function setupConnection() {
        conn.on('open', () => { document.getElementById('status').innerText = "LINK ESTABLISHED"; disconnected = false; if(isHost) resetPuck(); gameLoop(); });
        conn.on('close', () => { disconnected = true; gameActive = false; updateUI(); });
        conn.on('data', data => {
            if (data.type === 'PAUSE_REQ') handlePauseRequest(data.player);
            else if (data.type === 'RESUME') { isPaused = false; updateUI(); }
            else if (isHost) { p2.vx = data.x - p2.x; p2.vy = data.y - p2.y; p2.x = data.x; p2.y = data.y; }
            else { 
                p1.x = data.p1.x; p1.y = data.p1.y; puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores; seriesPoints = data.series; pausesLeft = data.pausesLeft;
                currentRound = data.round; gameActive = data.gameActive; isPaused = data.isPaused;
                matchStats = data.stats; goalY = data.goalY; respawnTimer = data.respawnTimer;
                lastWinnerLabel = data.lastWinnerLabel; updateUI();
            }
        });
    }

    function handleInput(clientX, clientY) {
        if (!gameActive || isPaused || disconnected) return;
        const rect = canvas.getBoundingClientRect(), scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        const mx = (clientX - rect.left) * scaleX, my = (clientY - rect.top) * scaleY;
        if (isHost) {
            p1.vx = mx - p1.x; p1.vy = my - p1.y;
            p1.x = Math.min(mx, centerX - p1.radius); p1.y = Math.max(p1.radius, Math.min(canvas.height - p1.radius, my));
            if (currentRound === 2) applyCircleConstraint(p1, "left");
        } else {
            p2.vx = mx - p2.x; p2.vy = my - p2.y;
            p2.x = Math.max(mx, centerX + p2.radius); p2.y = Math.max(p2.radius, Math.min(canvas.height - p2.radius, my));
            if (currentRound === 2) applyCircleConstraint(p2, "right");
            if (conn?.open) conn.send({ x: p2.x, y: p2.y });
        }
    }

    canvas.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

    function applyCircleConstraint(p, side) {
        let dx = p.x - centerX, dy = p.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - p.radius) {
            let angle = Math.atan2(dy, dx);
            p.x = centerX + Math.cos(angle) * (tableRadius - p.radius);
            p.y = centerY + Math.sin(angle) * (tableRadius - p.radius);
        }
        p.x = (side === "left") ? Math.min(p.x, centerX - 5) : Math.max(p.x, centerX + 5);
    }

    function update() {
        if (shakeIntensity > 0) shakeIntensity *= 0.92;
        if (isPaused || disconnected || !isHost || !gameActive) return;
        if (respawnTimer > 0) { 
            respawnTimer--; 
            if (respawnTimer === 0) { puck.dx = (Math.random() > 0.5 ? 5 : -5); puck.dy = (Math.random() - 0.5) * 4; }
            syncData(); return; 
        }
        puck.x += puck.dx; puck.y += puck.dy; puck.dx *= puck.friction; puck.dy *= puck.friction;
        
        if (currentRound === 1) {
            pipes.forEach(p => {
                if (puck.x > p.x - p.w/2 && puck.x < p.x + p.w/2 && puck.y > p.y - p.h/2 && puck.y < p.y + p.h/2) {
                    puck.dx = p.target === "right" ? 18 : -18; puck.dy *= 0.2;
                }
            });
        }
        
        if (currentRound === 2) {
            let dx = centerX - puck.x, dy = centerY - puck.y, dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < tableRadius) { puck.dx += dx * 0.0006; puck.dy += dy * 0.0006; }
            updateCirclePhysics();
        } else {
            updateRectPhysics();
        }
        
        checkCollision(p1, puck, 1); checkCollision(p2, puck, 2);
        updateUI(); syncData();
    }

    function updateRectPhysics() {
        const top = (currentRound === 3) ? goalY : (canvas.height - goalHeight)/2, bot = top + goalHeight;
        if (puck.y < puck.radius || puck.y > canvas.height - puck.radius) { puck.y = puck.y < puck.radius ? puck.radius : canvas.height - puck.radius; puck.dy *= -1; }
        if (puck.x < puck.radius) { if (puck.y > top && puck.y < bot) triggerGoal(1); else { puck.x = puck.radius; puck.dx *= -1; } }
        else if (puck.x > canvas.width - puck.radius) { if (puck.y > top && puck.y < bot) triggerGoal(2); else { puck.x = canvas.width - puck.radius; puck.dx *= -1; } }
        if (currentRound === 3) { goalY += 5.5 * goalDir; if (goalY > canvas.height - goalHeight || goalY < 0) goalDir *= -1; }
    }

    function updateCirclePhysics() {
        let dx = puck.x - centerX, dy = puck.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - puck.radius) {
            let angle = Math.atan2(dy, dx), deg = angle * (180 / Math.PI);
            if (Math.abs(deg) < 22) triggerGoal(2); 
            else if (Math.abs(deg) > 158) triggerGoal(1);
            else {
                let normal = Math.atan2(dy, dx), speed = Math.sqrt(puck.dx**2 + puck.dy**2);
                let reflection = 2 * normal - Math.atan2(puck.dy, puck.dx) + Math.PI;
                puck.dx = Math.cos(reflection) * speed * 0.99; puck.dy = Math.sin(reflection) * speed * 0.99;
                puck.x = centerX + Math.cos(normal) * (tableRadius - puck.radius - 2);
                puck.y = centerY + Math.sin(normal) * (tableRadius - puck.radius - 2);
            }
        }
    }

    function checkCollision(p, pk, pNum) {
        let dx = pk.x - p.x, dy = pk.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < p.radius + pk.radius) {
            if ((pNum === 1 && pk.dx < 0) || (pNum === 2 && pk.dx > 0)) matchStats['p' + pNum].saves++;
            lastHitter = pNum;
            let angle = Math.atan2(dy, dx), impact = Math.sqrt(p.vx**2 + p.vy**2), speed = Math.sqrt(pk.dx**2 + pk.dy**2) + (impact * 0.4) + 1.5;
            pk.dx = Math.cos(angle) * Math.min(speed, 22); pk.dy = Math.sin(angle) * Math.min(speed, 22);
            pk.x = p.x + Math.cos(angle) * (p.radius + pk.radius + 2);
            pk.y = p.y + Math.sin(angle) * (p.radius + pk.radius + 2);
        }
    }

    function triggerGoal(pNum) {
        pNum === 1 ? (scores.p2++, lastHitter === 1 ? matchStats.p1.ownGoals++ : matchStats.p2.goals++) : (scores.p1++, lastHitter === 2 ? matchStats.p2.ownGoals++ : matchStats.p1.goals++);
        shakeIntensity = 15; resetPuck();
    }

    function syncData() { if (conn?.open && isHost) conn.send({ p1, puck, scores, series: seriesPoints, pausesLeft, round: currentRound, gameActive, isPaused, goalY, respawnTimer, lastWinnerLabel, stats: matchStats }); }

    function resetPuck() { puck.x = centerX; puck.y = centerY; puck.dx = 0; puck.dy = 0; if(isHost) (scores.p1 >= WIN_SCORE || scores.p2 >= WIN_SCORE) ? startNewRound(scores.p1 >= WIN_SCORE ? "PLAYER 1" : "PLAYER 2") : respawnTimer = 160; }

    function startNewRound(winner) {
        gameActive = false; lastWinnerLabel = winner; seriesPoints[winner === "PLAYER 1" ? 'p1' : 'p2']++;
        if (seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN) { matchStats.p1.rank = calculateGrade('p1'); matchStats.p2.rank = calculateGrade('p2'); }
        else { setTimeout(() => { scores = {p1:0, p2:0}; currentRound++; p1.x = 150; p2.x = 850; gameActive = true; resetPuck(); updateUI(); }, 3000); }
        updateUI(); syncData();
    }

    function calculateGrade(p) {
        const s = matchStats[p], score = (s.goals * 10) + (s.saves * 5) - (s.ownGoals * 20);
        if (score >= 150 && s.ownGoals === 0) return "S+";
        if (score >= 90) return "S";
        return score >= 60 ? "A" : score >= 30 ? "B" : "C";
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1; document.getElementById('s2').innerText = scores.p2;
        document.getElementById('round-num').innerText = currentRound; document.getElementById('table-type').innerText = roundNames[currentRound-1];
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN, overlay = document.getElementById('overlay');
        if (isPaused) { overlay.style.display = 'block'; document.getElementById('winner-text').innerText = "PAUSED"; document.getElementById('resume-btn').style.display = 'inline-block'; }
        else if (!gameActive) {
            overlay.style.display = 'block'; document.getElementById('winner-text').innerText = isMatchOver ? lastWinnerLabel + " VICTORIOUS" : lastWinnerLabel + " ROUND WIN";
            if (isMatchOver) { document.getElementById('stats-ui').style.display = 'block'; if(isHost) document.getElementById('restart-btn').style.display = 'inline-block'; }
        } else overlay.style.display = 'none';
        const renderDots = (id, pts) => { let dots = ""; for(let i=0; i<SERIES_TO_WIN; i++) dots += `<span class="${i < pts ? 'won' : ''}">●</span> `; document.getElementById(id).innerHTML = dots; };
        renderDots('series-p1', seriesPoints.p1); renderDots('series-p2', seriesPoints.p2);
    }

    function draw() {
        ctx.save(); if (shakeIntensity > 0.5) ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity);
        ctx.fillStyle = '#050505'; ctx.fillRect(-20, -20, canvas.width+40, canvas.height+40);
        
        if (currentRound === 1) {
            pipes.forEach(p => {
                ctx.fillStyle = 'rgba(0, 255, 100, 0.1)'; ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
                ctx.strokeStyle = '#0f6'; ctx.lineWidth = 2; ctx.strokeRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
            });
        }
        
        if (currentRound === 2) {
            ctx.save(); ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, 0, Math.PI * 2); ctx.clip();
            let grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, tableRadius);
            grad.addColorStop(0, 'rgba(0, 255, 255, 0.1)'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fill(); ctx.restore();
            ctx.strokeStyle = '#222'; ctx.lineWidth = 6; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, 0, Math.PI*2); ctx.stroke();
            ctx.lineWidth = 10; ctx.strokeStyle = '#f0f'; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, -0.35, 0.35); ctx.stroke();
            ctx.strokeStyle = '#0ff'; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, Math.PI-0.35, Math.PI+0.35); ctx.stroke();
        } else {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 6; ctx.beginPath(); ctx.roundRect(0, 0, canvas.width, canvas.height, 45); ctx.stroke();
            const y = (currentRound === 3) ? goalY : (canvas.height - goalHeight)/2;
            ctx.fillStyle = '#0ff'; ctx.fillRect(0, y, 6, goalHeight); ctx.fillStyle = '#f0f'; ctx.fillRect(canvas.width-6, y, 6, goalHeight);
        }
        
        ctx.setLineDash([15, 15]); ctx.strokeStyle = '#1a1a1a'; ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();
        ctx.setLineDash([]); ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
        drawP(p1); drawP(p2);
        if (respawnTimer > 0) { ctx.textAlign = "center"; ctx.fillStyle = "#0ff"; ctx.font = "bold 90px 'Segoe UI'"; ctx.fillText(respawnTimer > 110 ? "GOAL!" : Math.ceil(respawnTimer/60), centerX, centerY + 30); }
        ctx.restore();
    }
    
    function drawP(p) { ctx.shadowBlur = 15; ctx.shadowColor = p.color; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); }
    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    function requestPause() { if (gameActive && !isPaused && !disconnected && pausesLeft[isHost ? 'p1' : 'p2'] > 0) isHost ? (pausesLeft.p1--, isPaused = true, syncData(), updateUI()) : conn.send({ type: 'PAUSE_REQ', player: 'p2' }); }
    function handlePauseRequest(p) { if (pausesLeft[p] > 0) { pausesLeft[p]--; isPaused = true; syncData(); updateUI(); } }
    function resumeGame() { isPaused = false; isHost ? syncData() : conn.send({ type: 'RESUME' }); updateUI(); }
    function resetFullMatch() { seriesPoints = {p1:0, p2:0}; scores = {p1:0, p2:0}; matchStats = {p1:{goals:0,saves:0,ownGoals:0,rank:"C"},p2:{goals:0,saves:0,ownGoals:0,rank:"C"}}; currentRound = 1; gameActive = true; resetPuck(); updateUI(); }
</script>
</body>
</html>
