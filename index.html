<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Air Hockey - Full Movement</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 15px; background: #222; padding: 15px; border-radius: 12px; border: 1px solid #0ff; box-shadow: 0 0 10px rgba(0,255,255,0.2); display: flex; gap: 10px; align-items: center; }
        canvas { border: 4px solid #444; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); cursor: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .score { font-size: 2.5rem; font-weight: bold; margin: 10px; text-shadow: 0 0 10px #0ff; }
        button { background: #0ff; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #0ff; }
        input { background: #333; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; outline: none; }
        #status { color: #888; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div id="menu">
        <div id="id-tag">My ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Paste Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
    </div>

    <div class="score"><span id="s1">0</span> : <span id="s2">0</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="status">Waiting for connection...</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    let isHost = false;

    // Game Constants
    const goalHeight = 160;
    const goalTop = (canvas.height - goalHeight) / 2;
    const goalBottom = goalTop + goalHeight;
    
    // Game State
    let scores = { p1: 0, p2: 0 };
    const puck = { x: 400, y: 250, dx: 0, dy: 0, radius: 15, friction: 0.99 };
    const p1 = { x: 100, y: 250, radius: 30 }; // Host (Blue)
    const p2 = { x: 700, y: 250, radius: 30 }; // Client (Pink)

    peer.on('open', id => document.getElementById('my-id').innerText = id);

    peer.on('connection', c => {
        conn = c;
        isHost = true;
        setupConnection();
    });

    function connectToFriend() {
        conn = peer.connect(document.getElementById('remote-id').value);
        isHost = false;
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "Status: Connected!";
            if(isHost) resetPuck();
            gameLoop();
        });

        conn.on('data', data => {
            if (isHost) {
                p2.x = data.x; p2.y = data.y;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y;
                puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores;
                document.getElementById('s1').innerText = scores.p1;
                document.getElementById('s2').innerText = scores.p2;
            }
        });
    }

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        let mx = e.clientX - rect.left;
        let my = e.clientY - rect.top;

        if (isHost) {
            p1.x = Math.min(mx, canvas.width/2 - p1.radius);
            p1.y = my;
            if (conn && conn.open) conn.send({ x: p1.x, y: p1.y });
        } else {
            p2.x = Math.max(mx, canvas.width/2 + p2.radius);
            p2.y = my;
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    });

    function checkCollision(paddle, pk) {
        let dx = pk.x - paddle.x;
        let dy = pk.y - paddle.y;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if (distance < paddle.radius + pk.radius) {
            let angle = Math.atan2(dy, dx);
            let speed = Math.sqrt(pk.dx**2 + pk.dy**2) + 2; 
            if (speed > 12) speed = 12;

            pk.dx = Math.cos(angle) * speed;
            pk.dy = Math.sin(angle) * speed;
            
            // Prevent sticking
            pk.x = paddle.x + Math.cos(angle) * (paddle.radius + pk.radius + 1);
            pk.y = paddle.y + Math.sin(angle) * (paddle.radius + pk.radius + 1);
        }
    }

    function resetPuck() {
        puck.x = 400; puck.y = 250;
        puck.dx = (Math.random() > 0.5 ? 4 : -4);
        puck.dy = (Math.random() - 0.5) * 6;
    }

    function update() {
        if (!isHost) return;

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        if (puck.y < puck.radius || puck.y > canvas.height - puck.radius) puck.dy *= -1;

        // Scoring
        if (puck.x < 0) {
            if (puck.y > goalTop && puck.y < goalBottom) { scores.p2++; resetPuck(); }
            else { puck.dx *= -1; puck.x = puck.radius; }
        }
        if (puck.x > canvas.width) {
            if (puck.y > goalTop && puck.y < goalBottom) { scores.p1++; resetPuck(); }
            else { puck.dx *= -1; puck.x = canvas.width - puck.radius; }
        }

        checkCollision(p1, puck);
        checkCollision(p2, puck);

        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;

        conn.send({ p1: p1, puck: puck, scores: scores });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Table Markings
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2); ctx.stroke();

        // Goals
        ctx.lineWidth = 8;
        ctx.strokeStyle = '#0ff'; ctx.strokeRect(0, goalTop, 4, goalHeight);
        ctx.strokeStyle = '#f07'; ctx.strokeRect(canvas.width-4, goalTop, 4, goalHeight);

        // Puck
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();

        // Paddles
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff';
        ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = '#f07'; ctx.shadowColor = '#f07';
        ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.radius, 0, Math.PI*2); ctx.fill();

        if (isHost) update();
        requestAnimationFrame(draw);
    }

    function gameLoop() { draw(); }
</script>
</body>
</html>
