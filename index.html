<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Air Hockey - Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #111; padding: 12px 20px; border-radius: 30px; border: 1px solid #333; display: flex; gap: 15px; align-items: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { border: 6px solid #222; border-radius: 10px; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); cursor: none; box-shadow: 0 0 40px rgba(0,255,255,0.1); }
        .score { font-size: 3rem; font-weight: 800; margin: 5px; font-variant-numeric: tabular-nums; letter-spacing: 10px; }
        button { background: #0ff; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; border-radius: 20px; transition: 0.2s; color: #000; }
        button:hover { transform: scale(1.05); background: #fff; }
        input { background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 20px; outline: none; width: 120px; }
        #status { color: #555; margin-top: 10px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="menu">
        <div id="id-tag">ID: <strong id="my-id" style="color:#0ff">...</strong></div>
        <input type="text" id="remote-id" placeholder="Friend ID">
        <button onclick="connectToFriend()">JOIN GAME</button>
    </div>

    <div class="score"><span id="s1">0</span><span style="color:#333"> : </span><span id="s2">0</span></div>
    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="status">Connecting to network...</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    let isHost = false;

    // Table Setup
    const goalHeight = 200;
    const goalTop = (canvas.height - goalHeight) / 2;
    const goalBottom = goalTop + goalHeight;
    
    // Smooth Physics Config
    const SUBSTEPS = 3; // Physics resolution
    let scores = { p1: 0, p2: 0 };
    const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 18, friction: 0.992 };
    const p1 = { x: 150, y: 300, radius: 35 }; 
    const p2 = { x: 850, y: 300, radius: 35 };

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('status').innerText = "Status: Online (Ready)";
    });

    peer.on('connection', c => {
        conn = c; isHost = true;
        setupConnection();
    });

    function connectToFriend() {
        const id = document.getElementById('remote-id').value;
        if(!id) return;
        conn = peer.connect(id);
        isHost = false;
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "Status: Connected!";
            if(isHost) resetPuck();
            gameLoop();
        });

        conn.on('data', data => {
            if (isHost) {
                p2.x = data.x; p2.y = data.y;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y;
                puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores;
                document.getElementById('s1').innerText = scores.p1;
                document.getElementById('s2').innerText = scores.p2;
            }
        });
    }

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        let mx = e.clientX - rect.left;
        let my = e.clientY - rect.top;

        if (isHost) {
            p1.x = Math.min(mx, canvas.width/2 - p1.radius);
            p1.y = my;
            if (conn && conn.open) conn.send({ x: p1.x, y: p1.y });
        } else {
            p2.x = Math.max(mx, canvas.width/2 + p2.radius);
            p2.y = my;
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    });

    function resolveCollision(paddle, pk) {
        let dx = pk.x - paddle.x;
        let dy = pk.y - paddle.y;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if (distance < paddle.radius + pk.radius) {
            let angle = Math.atan2(dy, dx);
            // Transfer paddle "vibe" to puck
            let speed = Math.sqrt(pk.dx**2 + pk.dy**2) + 2.5; 
            if (speed > 16) speed = 16; 

            pk.dx = Math.cos(angle) * speed;
            pk.dy = Math.sin(angle) * speed;
            
            // Push out to prevent overlap stuck
            let overlap = (paddle.radius + pk.radius) - distance;
            pk.x += Math.cos(angle) * (overlap + 1);
            pk.y += Math.sin(angle) * (overlap + 1);
        }
    }

    function resetPuck() {
        puck.x = 500; puck.y = 300;
        puck.dx = (Math.random() > 0.5 ? 5 : -5);
        puck.dy = (Math.random() - 0.5) * 8;
    }

    function update() {
        if (!isHost) return;

        // Sub-stepping for ultra smooth motion
        for(let i=0; i < SUBSTEPS; i++) {
            puck.x += (puck.dx / SUBSTEPS);
            puck.y += (puck.dy / SUBSTEPS);

            // Bounds check inside sub-steps
            if (puck.y < puck.radius || puck.y > canvas.height - puck.radius) {
                puck.dy *= -1;
                puck.y = puck.y < puck.radius ? puck.radius : canvas.height - puck.radius;
            }
            resolveCollision(p1, puck);
            resolveCollision(p2, puck);
        }

        puck.dx *= puck.friction;
        puck.dy *= puck.friction;

        // Scoring Logic
        if (puck.x < 0) {
            if (puck.y > goalTop && puck.y < goalBottom) { scores.p2++; resetPuck(); }
            else { puck.dx *= -1; puck.x = puck.radius; }
        }
        if (puck.x > canvas.width) {
            if (puck.y > goalTop && puck.y < goalBottom) { scores.p1++; resetPuck(); }
            else { puck.dx *= -1; puck.x = canvas.width - puck.radius; }
        }

        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;

        if (conn && conn.open) {
            conn.send({ p1: p1, puck: puck, scores: scores });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Field Markings
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 80, 0, Math.PI*2); ctx.stroke();

        // Goal Slots
        ctx.lineWidth = 10;
        ctx.strokeStyle = '#0ff'; ctx.strokeRect(0, goalTop, 4, goalHeight);
        ctx.strokeStyle = '#f07'; ctx.strokeRect(canvas.width-4, goalTop, 4, goalHeight);

        // Puck
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Paddles
        ctx.fillStyle = '#0ff'; ctx.shadowBlur = 25; ctx.shadowColor = '#0ff';
        ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = '#f07'; ctx.shadowColor = '#f07';
        ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        if (isHost) update();
        requestAnimationFrame(draw);
    }

    function gameLoop() { draw(); }
</script>
</body>
</html>
