<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey - Refactored</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Styles remain identical to your original CSS */
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; display: flex; gap: 15px; align-items: center; z-index: 10; }
        canvas { border: 2px solid #222; background: #000; cursor: none; box-shadow: 0 0 30px rgba(0,255,255,0.05); touch-action: none; }
        .hud { display: flex; justify-content: space-between; width: 1000px; max-width: 95vw; align-items: center; margin-bottom: 20px; }
        .score { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 10px #0ff; min-width: 80px; text-align: center; }
        .round-display { text-align: center; color: #ccc; background: rgba(255,255,255,0.03); padding: 12px 50px; border-radius: 15px; border: 1px solid #333; min-width: 300px; }
        button { background: #0ff; border: none; padding: 8px 18px; cursor: pointer; font-weight: bold; border-radius: 4px; color: #000; text-transform: uppercase; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.96); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #0ff; display: none; z-index: 100; min-width: 500px; }
    </style>
</head>
<body>

    <div id="menu">
        <div>ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" style="background:#111; color:white; border:1px solid #444; padding:8px;" placeholder="Paste ID">
        <button onclick="network.connect()">Connect</button>
        <button id="pause-btn" onclick="game.requestPause()">Pause</button>
    </div>

    <div class="hud">
        <div class="score" id="s1">0</div>
        <div class="round-display">
            <div id="round-label">ROUND <span id="round-num">1</span></div>
            <span id="table-type">VELOCITY SURGE</span>
        </div>
        <div class="score" id="s2" style="color:#f0f;">0</div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <div id="overlay">
        <h1 id="winner-text">GAME PAUSED</h1>
        <button id="resume-btn" onclick="game.resume()">Resume</button>
    </div>

<script>
/**
 * CORE CONSTANTS
 */
const CONFIG = {
    W: 1000, H: 600,
    PADDLE_RAD: 32, PUCK_RAD: 15,
    GOAL_SIZE: 160,
    FRICTION: 0.993,
    MAX_SPEED: 21
};

/**
 * PHYSICS ENTITIES
 */
class Entity {
    constructor(x, y, radius, color) {
        this.x = x; this.y = y; this.radius = radius; this.color = color;
        this.vx = 0; this.vy = 0;
    }
}

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.p1 = new Entity(150, 300, CONFIG.PADDLE_RAD, '#0ff');
        this.p2 = new Entity(850, 300, CONFIG.PADDLE_RAD, '#f0f');
        this.puck = new Entity(500, 300, CONFIG.PUCK_RAD, '#fff');
        
        this.state = {
            scores: { p1: 0, p2: 0 },
            round: 1,
            isPaused: false,
            active: true,
            respawnTimer: 0,
            shake: 0
        };

        this.initInputs();
    }

    initInputs() {
        const handleMove = (e) => {
            if (!this.state.active || this.state.isPaused) return;
            const rect = this.canvas.getBoundingClientRect();
            const mx = (e.clientX || e.touches[0].clientX) - rect.left;
            const my = (e.clientY || e.touches[0].clientY) - rect.top;

            if (network.isHost) {
                this.updatePaddle(this.p1, mx, my, 0, CONFIG.W/2);
            } else {
                network.sendMove(mx, my);
            }
        };

        this.canvas.addEventListener('mousemove', handleMove);
        this.canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive: false});
    }

    updatePaddle(p, mx, my, minX, maxX) {
        p.vx = mx - p.x; p.vy = my - p.y;
        p.x = Math.max(minX + p.radius, Math.min(maxX - p.radius, mx));
        p.y = Math.max(p.radius, Math.min(CONFIG.H - p.radius, my));
    }

    processPhysics() {
        if (!network.isHost || !this.state.active || this.state.isPaused) return;

        // Puck Movement
        this.puck.x += this.puck.vx; this.puck.y += this.puck.vy;
        this.puck.vx *= CONFIG.FRICTION; this.puck.vy *= CONFIG.FRICTION;

        // Wall Collisions
        if (this.puck.y < this.puck.radius || this.puck.y > CONFIG.H - this.puck.radius) {
            this.puck.vy *= -1;
        }

        // Goal Logic (Basic Rectangular Example)
        const goalTop = (CONFIG.H - CONFIG.GOAL_SIZE) / 2;
        if (this.puck.x < 0 && (this.puck.y > goalTop && this.puck.y < goalTop + CONFIG.GOAL_SIZE)) {
            this.scoreGoal('p2');
        } else if (this.puck.x > CONFIG.W && (this.puck.y > goalTop && this.puck.y < goalTop + CONFIG.GOAL_SIZE)) {
            this.scoreGoal('p1');
        }

        this.checkPaddleCollision(this.p1);
        this.checkPaddleCollision(this.p2);
    }

    checkPaddleCollision(p) {
        let dx = this.puck.x - p.x, dy = this.puck.y - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < p.radius + this.puck.radius) {
            let angle = Math.atan2(dy, dx);
            let speed = Math.sqrt(this.puck.vx**2 + this.puck.vy**2) + 2;
            this.puck.vx = Math.cos(angle) * Math.min(speed, CONFIG.MAX_SPEED);
            this.puck.vy = Math.sin(angle) * Math.min(speed, CONFIG.MAX_SPEED);
        }
    }

    scoreGoal(winner) {
        this.state.scores[winner]++;
        this.state.shake = 10;
        this.resetPuck();
    }

    resetPuck() {
        this.puck.x = CONFIG.W/2; this.puck.y = CONFIG.H/2;
        this.puck.vx = 0; this.puck.vy = 0;
    }

    requestPause() { this.state.isPaused = !this.state.isPaused; this.updateUI(); }
    resume() { this.state.isPaused = false; this.updateUI(); }

    updateUI() {
        document.getElementById('s1').innerText = this.state.scores.p1;
        document.getElementById('s2').innerText = this.state.scores.p2;
        document.getElementById('overlay').style.display = this.state.isPaused ? 'block' : 'none';
    }

    draw() {
        this.ctx.clearRect(0,0, CONFIG.W, CONFIG.H);
        
        // Draw Center Line
        this.ctx.strokeStyle = '#222';
        this.ctx.beginPath(); this.ctx.moveTo(CONFIG.W/2, 0); this.ctx.lineTo(CONFIG.W/2, CONFIG.H); this.ctx.stroke();

        this.drawCircle(this.p1);
        this.drawCircle(this.p2);
        this.drawCircle(this.puck);
    }

    drawCircle(obj) {
        this.ctx.fillStyle = obj.color;
        this.ctx.beginPath();
        this.ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI*2);
        this.ctx.fill();
    }

    loop() {
        this.processPhysics();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

/**
 * NETWORK HANDLER
 */
const network = {
    peer: new Peer(),
    conn: null,
    isHost: false,
    
    init() {
        this.peer.on('open', id => document.getElementById('my-id').innerText = id);
        this.peer.on('connection', c => { this.conn = c; this.isHost = true; this.listen(); });
    },
    connect() {
        const id = document.getElementById('remote-id').value;
        this.conn = this.peer.connect(id);
        this.isHost = false;
        this.listen();
    },
    listen() {
        this.conn.on('data', data => {
            if (this.isHost) {
                game.updatePaddle(game.p2, data.x, data.y, CONFIG.W/2, CONFIG.W);
            } else {
                // Client receives full state sync from host
                Object.assign(game.puck, data.puck);
                Object.assign(game.p1, data.p1);
                game.state = data.state;
                game.updateUI();
            }
        });
        if (this.isHost) setInterval(() => this.broadcast(), 16);
    },
    broadcast() {
        if (this.conn) this.conn.send({ puck: game.puck, p1: game.p1, state: game.state });
    },
    sendMove(x, y) {
        if (this.conn) this.conn.send({ x, y });
    }
};

const game = new GameEngine();
network.init();
game.loop();

</script>
</body>
</html>
