<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey Pro - Elite Ranked</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; display: flex; gap: 15px; align-items: center; z-index: 10; }
        canvas { border: 2px solid #222; background: #000; cursor: none; box-shadow: 0 0 40px rgba(0,255,255,0.1); }
        .hud { display: flex; justify-content: space-between; width: 1000px; align-items: center; margin-bottom: 20px; }
        .score { font-size: 3rem; font-weight: 900; min-width: 100px; text-align: center; }
        #s1 { color: #0ff; text-shadow: 0 0 15px #0ff; }
        #s2 { color: #f0f; text-shadow: 0 0 15px #f0f; }
        .round-display { text-align: center; color: #ccc; background: rgba(255,255,255,0.03); padding: 10px 40px; border-radius: 12px; border: 1px solid #333; }
        button { background: #0ff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 6px; color: #000; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.05); }
        button:disabled { background: #222; color: #444; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.98); padding: 50px; border-radius: 25px; text-align: center; border: 2px solid #333; display: none; z-index: 100; min-width: 400px; box-shadow: 0 0 100px rgba(0,0,0,1); }
        input { background:#111; color:white; border:1px solid #444; padding:10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="menu">
        <div>MY ID: <strong id="my-id" style="color:white; font-family: monospace;">...</strong></div>
        <input type="text" id="remote-id" placeholder="Enter Friend's ID">
        <button onclick="network.connect()">CONNECT & PLAY</button>
        <button id="pause-btn" onclick="game.requestPause()">PAUSE</button>
    </div>

    <div class="hud">
        <div class="score" id="s1">0</div>
        <div class="round-display">
            <div style="font-size: 0.7rem; color: #666; letter-spacing: 2px;">MATCH STATUS</div>
            <strong id="status-text" style="color: #0f0;">AWAITING OPPONENT</strong>
        </div>
        <div class="score" id="s2">0</div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 3.5rem; letter-spacing: -2px;">-</h1>
        <div id="rank-box" style="margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 15px;">
            <div style="color: #666; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px;">MATCH PERFORMANCE</div>
            <div id="rank-grade" style="font-size: 7rem; font-weight: 900; line-height: 1;">-</div>
            <div id="rank-label" style="font-size: 1.2rem; margin-top: 10px; font-weight: bold; text-transform: uppercase;">-</div>
        </div>
        <button id="restart-btn" onclick="location.reload()">REMATCH / NEW SESSION</button>
    </div>

<script>
const CONFIG = {
    CANVAS_WIDTH: 1000,
    CANVAS_HEIGHT: 600,
    PADDLE_RADIUS: 30,
    PUCK_RADIUS: 15,
    GOAL_HEIGHT: 180,
    WIN_SCORE: 13,
    FRICTION: 0.994,
    MAX_SPEED: 26
};

class Paddle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.radius = CONFIG.PADDLE_RADIUS;
        this.color = color;
    }
    draw(ctx) {
        ctx.save();
        ctx.shadowBlur = 20; ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 3; ctx.stroke();
        ctx.restore();
    }
}

class Puck {
    constructor() {
        this.reset();
        this.radius = CONFIG.PUCK_RADIUS;
    }
    reset() {
        this.x = CONFIG.CANVAS_WIDTH / 2;
        this.y = CONFIG.CANVAS_HEIGHT / 2;
        this.dx = 0; this.dy = 0;
    }
    update() {
        this.x += this.dx;
        this.y += this.dy;
        this.dx *= CONFIG.FRICTION;
        this.dy *= CONFIG.FRICTION;
    }
    draw(ctx) {
        ctx.save();
        ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.p1 = new Paddle(100, 300, '#0ff');
        this.p2 = new Paddle(900, 300, '#f0f');
        this.puck = new Puck();
        this.state = { scores: { p1: 0, p2: 0 }, active: false, paused: false, gameOver: false, respawnTimer: 0 };
        this.initListeners();
    }

    initListeners() {
        this.canvas.addEventListener('mousemove', (e) => {
            if (!this.state.active || this.state.paused || this.state.gameOver) return;
            const rect = this.canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            if (network.isHost) {
                this.p1.x = Math.min(mx, 480);
                this.p1.y = Math.max(30, Math.min(570, my));
            } else {
                this.p2.x = Math.max(520, mx);
                this.p2.y = Math.max(30, Math.min(570, my));
                network.send({ type: 'MOVE', x: this.p2.x, y: this.p2.y });
            }
        });
    }

    update() {
        if (!this.state.active || this.state.paused || this.state.gameOver || !network.isHost) return;
        if (this.state.respawnTimer > 0) {
            if (--this.state.respawnTimer === 0) this.launchPuck();
            return;
        }
        this.puck.update();
        this.handleCollisions();
        if (this.state.scores.p1 >= CONFIG.WIN_SCORE || this.state.scores.p2 >= CONFIG.WIN_SCORE) {
            this.endGame();
        }
        network.sync(this.state, this.p1, this.puck);
    }

    launchPuck() {
        this.puck.dx = (Math.random() > 0.5 ? 7 : -7);
        this.puck.dy = (Math.random() - 0.5) * 10;
    }

    handleCollisions() {
        const gT = (600 - CONFIG.GOAL_HEIGHT) / 2;
        const gB = gT + CONFIG.GOAL_HEIGHT;

        if (this.puck.y < 15 || this.puck.y > 585) this.puck.dy *= -1;

        if (this.puck.x < 15) {
            if (this.puck.y > gT && this.puck.y < gB) this.scoreGoal(2);
            else { this.puck.x = 15; this.puck.dx *= -1; }
        } else if (this.puck.x > 985) {
            if (this.puck.y > gT && this.puck.y < gB) this.scoreGoal(1);
            else { this.puck.x = 985; this.puck.dx *= -1; }
        }
        this.checkPaddle(this.p1); this.checkPaddle(this.p2);
    }

    checkPaddle(p) {
        let dx = this.puck.x - p.x, dy = this.puck.y - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 45) {
            let angle = Math.atan2(dy, dx);
            let s = Math.sqrt(this.puck.dx**2 + this.puck.dy**2) + 3;
            this.puck.dx = Math.cos(angle) * Math.min(s, CONFIG.MAX_SPEED);
            this.puck.dy = Math.sin(angle) * Math.min(s, CONFIG.MAX_SPEED);
            this.puck.x += Math.cos(angle) * (47 - dist);
            this.puck.y += Math.sin(angle) * (47 - dist);
        }
    }

    scoreGoal(n) {
        this.state.scores['p' + n]++;
        this.puck.reset();
        this.state.respawnTimer = 60;
        this.updateUI();
    }

    updateUI() {
        document.getElementById('s1').innerText = this.state.scores.p1;
        document.getElementById('s2').innerText = this.state.scores.p2;
    }

    render() {
        this.ctx.fillStyle = '#050505';
        this.ctx.fillRect(0, 0, 1000, 600);
        this.ctx.strokeStyle = '#222'; this.ctx.lineWidth = 4;
        this.ctx.beginPath(); this.ctx.moveTo(500, 0); this.ctx.lineTo(500, 600); this.ctx.stroke();
        this.ctx.beginPath(); this.ctx.arc(500, 300, 80, 0, Math.PI*2); this.ctx.stroke();
        
        this.p1.draw(this.ctx); this.p2.draw(this.ctx); this.puck.draw(this.ctx);
        if (this.state.respawnTimer > 0) {
            this.ctx.fillStyle = "#fff"; this.ctx.font = "bold 50px Segoe UI";
            this.ctx.textAlign = "center"; this.ctx.fillText("READY", 500, 315);
        }
    }

    endGame() {
        this.state.gameOver = true;
        const winner = this.state.scores.p1 >= CONFIG.WIN_SCORE ? 1 : 2;
        this.showEndScreen(winner);
        network.send({ type: 'END_GAME', winner });
    }

    calculateRank(isWinner, myScore, oppScore) {
        const diff = Math.abs(myScore - oppScore);
        if (isWinner) {
            if (diff >= 12) return { g: "S+", c: "#fff700", l: "GODLIKE" };
            if (diff >= 9)  return { g: "S",  c: "#0ff",    l: "DOMINATOR" };
            if (diff >= 6)  return { g: "A",  c: "#0f0",    l: "ELITE" };
            if (diff >= 3)  return { g: "B",  c: "#f0f",    l: "SKILLED" };
            return { g: "C", c: "#ffa500", l: "COMPETITIVE" };
        } else {
            if (myScore >= 10) return { g: "B", c: "#f0f",    l: "CHALLENGER" };
            if (myScore >= 7)  return { g: "C", c: "#ffa500", l: "RESILIENT" };
            if (myScore >= 4)  return { g: "D", c: "#888",    l: "SURVIVOR" };
            return { g: "F", c: "#ff4444", l: "HUMBLED" };
        }
    }

    showEndScreen(winNum) {
        const myNum = network.isHost ? 1 : 2;
        const win = winNum === myNum;
        const s = winNum === 1 ? [this.state.scores.p1, this.state.scores.p2] : [this.state.scores.p2, this.state.scores.p1];
        const r = this.calculateRank(win, (myNum===1?this.state.scores.p1:this.state.scores.p2), (myNum===1?this.state.scores.p2:this.state.scores.p1));

        document.getElementById('overlay').style.display = 'block';
        document.getElementById('winner-text').innerText = win ? "VICTORY" : "DEFEAT";
        document.getElementById('winner-text').style.color = win ? "#0ff" : "#ff4444";
        document.getElementById('rank-grade').innerText = r.g;
        document.getElementById('rank-grade').style.color = r.c;
        document.getElementById('rank-grade').style.textShadow = `0 0 30px ${r.c}88`;
        document.getElementById('rank-label').innerText = r.l;
        document.getElementById('rank-label').style.color = r.c;
    }

    requestPause() {
        this.state.paused = !this.state.paused;
        network.send({ type: 'PAUSE', paused: this.state.paused });
    }
}

class NetworkManager {
    constructor() {
        this.peer = new Peer();
        this.conn = null;
        this.isHost = false;
        this.peer.on('open', id => document.getElementById('my-id').innerText = id);
        this.peer.on('connection', c => this.handleIncoming(c));
    }
    connect() {
        this.conn = this.peer.connect(document.getElementById('remote-id').value);
        this.isHost = false; this.setupHandlers();
    }
    handleIncoming(c) {
        this.conn = c; this.isHost = true; this.setupHandlers();
    }
    setupHandlers() {
        this.conn.on('open', () => {
            document.getElementById('status-text').innerText = "LIVE MATCH";
            game.state.active = true;
            this.loop();
        });
        this.conn.on('data', d => {
            if (d.type === 'SYNC') {
                game.p1.x = d.p1.x; game.p1.y = d.p1.y;
                game.puck.x = d.puck.x; game.puck.y = d.puck.y;
                game.state = d.state; game.updateUI();
            } else if (d.type === 'MOVE') {
                game.p2.x = d.x; game.p2.y = d.y;
            } else if (d.type === 'PAUSE') {
                game.state.paused = d.paused;
            } else if (d.type === 'END_GAME') {
                game.showEndScreen(d.winner);
            }
        });
    }
    send(d) { if (this.conn?.open) this.conn.send(d); }
    sync(state, p1, puck) {
        this.send({ type: 'SYNC', state, p1: {x: p1.x, y: p1.y}, puck: {x: puck.x, y: puck.y} });
    }
    loop() {
        game.update(); game.render();
        requestAnimationFrame(() => this.loop());
    }
}

const game = new GameEngine();
const network = new NetworkManager();
</script>
</body>
</html>
