<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey - Pro Gravity Colosseum</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon-blue: #0ff; --neon-pink: #f0f; }
        
        body { 
            background: #050505; 
            color: var(--neon-blue); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            height: 100dvh; /* Dynamic viewport height for mobile */
            margin: 0; 
            padding: 5px;
            box-sizing: border-box;
            overflow: hidden;
        }

        #menu { 
            width: 100%;
            max-width: 800px;
            background: #111; 
            padding: 8px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            align-items: center; 
            justify-content: center;
            font-size: 0.85rem;
        }

        .hud { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            max-width: 900px;
            align-items: center; 
            margin: 5px 0;
        }

        canvas { 
            width: 100%; 
            max-width: 900px;
            max-height: 65vh; /* Prevents bottom cutoff */
            aspect-ratio: 1000 / 600; 
            border: 2px solid #222; 
            background: #000; 
            touch-action: none; 
            border-radius: 8px;
        }

        .score { font-size: 2.2rem; font-weight: bold; text-shadow: 0 0 10px var(--neon-blue); }
        .series-dots { font-size: 1rem; color: #333; }
        .series-dots .won { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        .series-dots.p2 .won { color: var(--neon-pink); text-shadow: 0 0 8px var(--neon-pink); }
        
        .round-display { 
            text-align: center; 
            background: rgba(255,255,255,0.05); 
            padding: 5px 15px; 
            border-radius: 10px; 
            border: 1px solid #333; 
        }

        #table-type { display: block; font-size: 1rem; font-weight: 900; color: #fff; text-transform: uppercase; }

        button { background: var(--neon-blue); border: none; padding: 6px 12px; cursor: pointer; font-weight: bold; border-radius: 4px; color: #000; text-transform: uppercase; font-size: 0.75rem; }
        input { background: #111; border: 1px solid #444; color: white; padding: 6px; border-radius: 4px; width: 110px; }
        
        #overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.95); padding: 20px; border-radius: 15px; 
            text-align: center; border: 2px solid var(--neon-blue); 
            display: none; z-index: 100; width: 85%; max-width: 400px; 
        }

        /* Mobile specific font scaling */
        @media (max-width: 480px) {
            .score { font-size: 1.6rem; }
            #table-type { font-size: 0.8rem; }
            #menu { gap: 5px; }
            input { width: 80px; }
        }

        .rank-letter { font-size: 2.5rem; font-weight: 900; }
        .stat-label { color: #888; font-size: 0.6rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="menu">
        <div>ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
        <button id="pause-btn" style="background:#fa0" onclick="requestPause()">Pause</button>
        <div style="font-size: 0.7rem; color: #888;">P: <span id="p1-pauses">4</span>|<span id="p2-pauses">4</span></div>
    </div>

    <div class="hud">
        <div style="text-align: center;">
            <div class="score" id="s1">0</div>
            <div id="series-p1" class="series-dots">● ●</div>
        </div>
        
        <div class="round-display">
            <div style="font-size: 0.6rem; color: #888;">ROUND <span id="round-num">1</span></div>
            <span id="table-type">VELOCITY SURGE</span>
        </div>

        <div style="text-align: center;">
            <div class="score" id="s2" style="color:var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink);">0</div>
            <div id="series-p2" class="series-dots p2">● ●</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    
    <div id="status" style="color: #444; margin-bottom: 10px; font-size: 0.75rem;">Waiting for link...</div>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 1.5rem;">-</h1>
        <div id="stats-ui" style="display:none; margin-top:15px; border-top:1px solid #333; padding-top:10px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><div class="stat-label">P1 Rank</div><div class="rank-letter" id="rank-p1">-</div></div>
                <div><div class="stat-label">P2 Rank</div><div class="rank-letter" id="rank-p2">-</div></div>
            </div>
        </div>
        <div style="margin-top:20px; display: flex; gap:10px; justify-content: center;">
            <button id="resume-btn" style="display:none; background:#0f0;" onclick="resumeGame()">Resume</button>
            <button id="restart-btn" style="display:none;" onclick="location.reload()">New Match</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    let isHost = false, gameActive = false, isPaused = false, disconnected = false;

    const centerX = 500, centerY = 300, tableRadius = 280, goalHeight = 160;
    const WIN_SCORE = 13, SERIES_TO_WIN = 2;
    
    let currentRound = 1, lastWinnerLabel = "", shakeIntensity = 0; 
    let scores = { p1: 0, p2: 0 }, seriesPoints = { p1: 0, p2: 0 }, pausesLeft = { p1: 4, p2: 4 };
    let respawnTimer = 0, lastHitter = 0;

    let matchStats = {
        p1: { goals: 0, saves: 0, rank: "C" },
        p2: { goals: 0, saves: 0, rank: "C" }
    };

    const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 15, friction: 0.993 };
    const p1 = { x: 150, y: 300, vx: 0, vy: 0, radius: 32, color: '#0ff' };
    const p2 = { x: 850, y: 300, vx: 0, vy: 0, radius: 32, color: '#f0f' };
    let goalY = (canvas.height - goalHeight) / 2, goalDir = 1;

    function getScaledInput(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
        const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
        return {
            x: (clientX - rect.left) * (1000 / rect.width),
            y: (clientY - rect.top) * (600 / rect.height)
        };
    }

    function handleInput(e) {
        if (isPaused || disconnected) return;
        const pos = getScaledInput(e);

        if (isHost) {
            p1.vx = pos.x - p1.x; p1.vy = pos.y - p1.y;
            p1.x = Math.min(pos.x, 480);
            p1.y = Math.max(32, Math.min(568, pos.y));
            if (currentRound === 2) applyCircleConstraint(p1, "left");
        } else {
            p2.x = Math.max(pos.x, 520);
            p2.y = Math.max(32, Math.min(568, pos.y));
            if (currentRound === 2) applyCircleConstraint(p2, "right");
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    }

    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isHost = true; setupConnection(); });

    function connectToFriend() {
        conn = peer.connect(document.getElementById('remote-id').value);
        isHost = false; setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "LINK ACTIVE";
            gameActive = true;
            if(isHost) resetPuck();
            gameLoop();
        });
        conn.on('data', data => {
            if (data.type === 'PAUSE_REQ') handlePauseRequest(data.player);
            else if (data.type === 'RESUME') { isPaused = false; updateUI(); }
            else if (isHost) {
                p2.vx = data.x - p2.x; p2.vy = data.y - p2.y;
                p2.x = data.x; p2.y = data.y;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y; puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores; seriesPoints = data.series; pausesLeft = data.pausesLeft;
                currentRound = data.round; gameActive = data.gameActive; isPaused = data.isPaused;
                matchStats = data.stats; goalY = data.goalY; respawnTimer = data.respawnTimer;
                lastWinnerLabel = data.lastWinnerLabel; 
                updateUI();
            }
        });
    }

    function update() {
        if (shakeIntensity > 0) shakeIntensity *= 0.9;
        if (isPaused || !isHost || !gameActive) return;

        if (respawnTimer > 0) {
            respawnTimer--;
            if (respawnTimer === 0) {
                puck.dx = (Math.random() > 0.5 ? 4 : -4);
                puck.dy = (Math.random() - 0.5) * 6;
            }
            syncData(); return;
        }

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        if (currentRound === 2) updateCirclePhysics();
        else updateRectPhysics();

        checkCollision(p1, puck, 1);
        checkCollision(p2, puck, 2);
        updateUI(); syncData();
    }

    function checkCollision(paddle, pk, pNum) {
        let dx = pk.x - paddle.x, dy = pk.y - paddle.y, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < paddle.radius + pk.radius) {
            if ((pNum === 1 && pk.dx < 0) || (pNum === 2 && pk.dx > 0)) matchStats['p' + pNum].saves++;
            lastHitter = pNum;
            let angle = Math.atan2(dy, dx), speed = Math.sqrt(pk.dx**2 + pk.dy**2) + 2;
            pk.dx = Math.cos(angle) * Math.min(speed, 20); pk.dy = Math.sin(angle) * Math.min(speed, 20);
            pk.x = paddle.x + Math.cos(angle) * (paddle.radius + pk.radius + 2);
            pk.y = paddle.y + Math.sin(angle) * (paddle.radius + pk.radius + 2);
        }
    }

    function updateRectPhysics() {
        const curGoalTop = (currentRound === 3) ? goalY : (600 - goalHeight)/2;
        if (currentRound === 3) {
            goalY += 5 * goalDir;
            if (goalY > 600 - goalHeight || goalY < 0) goalDir *= -1;
        }
        if (puck.y < 15 || puck.y > 585) puck.dy *= -1;
        if (puck.x < 15) {
            if (puck.y > curGoalTop && puck.y < curGoalTop + goalHeight) triggerGoal(1);
            else { puck.x = 15; puck.dx *= -1; }
        } else if (puck.x > 985) {
            if (puck.y > curGoalTop && puck.y < curGoalTop + goalHeight) triggerGoal(2);
            else { puck.x = 985; puck.dx *= -1; }
        }
    }

    function updateCirclePhysics() {
        let dx = puck.x - centerX, dy = puck.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - 15) {
            let angle = Math.atan2(dy, dx), deg = angle * (180 / Math.PI);
            if (Math.abs(deg) < 20) triggerGoal(2);
            else if (Math.abs(deg) > 160) triggerGoal(1);
            else {
                let normal = Math.atan2(dy, dx);
                puck.dx *= -0.99; puck.dy *= -0.99;
                puck.x = centerX + Math.cos(normal) * (tableRadius - 17);
                puck.y = centerY + Math.sin(normal) * (tableRadius - 17);
            }
        }
    }

    function applyCircleConstraint(p, side) {
        let dx = p.x - centerX, dy = p.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - p.radius) {
            let angle = Math.atan2(dy, dx);
            p.x = centerX + Math.cos(angle) * (tableRadius - p.radius);
            p.y = centerY + Math.sin(angle) * (tableRadius - p.radius);
        }
    }

    function triggerGoal(scoredOnPlayer) {
        if (scoredOnPlayer === 1) { scores.p2++; if (lastHitter === 2) matchStats.p2.goals++; } 
        else { scores.p1++; if (lastHitter === 1) matchStats.p1.goals++; }
        shakeIntensity = 10; resetPuck();
    }

    function syncData() {
        if (conn?.open && isHost) {
            conn.send({ p1, puck, scores, series: seriesPoints, pausesLeft, round: currentRound, gameActive, isPaused, goalY, respawnTimer, lastWinnerLabel, stats: matchStats });
        }
    }

    function resetPuck() {
        puck.x = centerX; puck.y = centerY; puck.dx = 0; puck.dy = 0;
        if (scores.p1 >= WIN_SCORE) startNewRound("PLAYER 1");
        else if (scores.p2 >= WIN_SCORE) startNewRound("PLAYER 2");
        else respawnTimer = 120;
    }

    function startNewRound(winner) {
        gameActive = false; lastWinnerLabel = winner; seriesPoints[winner === "PLAYER 1" ? 'p1' : 'p2']++;
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
        if (isMatchOver) {
            matchStats.p1.rank = calculateGrade('p1');
            matchStats.p2.rank = calculateGrade('p2');
        }
        updateUI(); syncData(); 
        if (!isMatchOver) {
            setTimeout(() => { scores = {p1:0, p2:0}; currentRound++; gameActive = true; resetPuck(); }, 3000);
        }
    }

    function calculateGrade(p) {
        let s = (matchStats[p].goals * 20) + (matchStats[p].saves * 10);
        return s > 300 ? "S" : s > 150 ? "A" : "B";
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;
        document.getElementById('round-num').innerText = currentRound;
        document.getElementById('p1-pauses').innerText = pausesLeft.p1;
        document.getElementById('p2-pauses').innerText = pausesLeft.p2;
        
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
        const overlay = document.getElementById('overlay');

        if (isPaused) {
            overlay.style.display = 'block';
            document.getElementById('winner-text').innerText = "PAUSED";
            document.getElementById('resume-btn').style.display = 'inline-block';
        } else if (!gameActive && lastWinnerLabel) {
            overlay.style.display = 'block';
            document.getElementById('winner-text').innerText = lastWinnerLabel + (isMatchOver ? " WINS MATCH" : " WINS ROUND");
            if (isMatchOver) {
                document.getElementById('stats-ui').style.display = 'block';
                document.getElementById('rank-p1').innerText = matchStats.p1.rank;
                document.getElementById('rank-p2').innerText = matchStats.p2.rank;
                document.getElementById('restart-btn').style.display = 'inline-block';
            }
        } else { overlay.style.display = 'none'; }
        
        const renderDots = (id, pts) => {
            let dots = ""; for(let i=0; i<SERIES_TO_WIN; i++) dots += `<span class="${i < pts ? 'won' : ''}">●</span> `;
            document.getElementById(id).innerHTML = dots;
        };
        renderDots('series-p1', seriesPoints.p1); renderDots('series-p2', seriesPoints.p2);
    }

    function requestPause() {
        const p = isHost ? 'p1' : 'p2';
        if (pausesLeft[p] > 0 && !isPaused) {
            if (isHost) handlePauseRequest('p1'); else conn.send({ type: 'PAUSE_REQ', player: 'p2' });
        }
    }

    function handlePauseRequest(p) { isPaused = true; pausesLeft[p]--; syncData(); updateUI(); }
    function resumeGame() { isPaused = false; if (isHost) syncData(); else conn.send({ type: 'RESUME' }); updateUI(); }

    function draw() {
        ctx.save();
        if (shakeIntensity > 0.5) ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity);
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 1000, 600);
        
        if (currentRound === 2) {
            ctx.beginPath(); ctx.arc(500, 300, tableRadius, 0, Math.PI*2);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 8; ctx.stroke();
            ctx.strokeStyle = '#f0f'; ctx.beginPath(); ctx.arc(500, 300, tableRadius, Math.PI-0.3, Math.PI+0.3); ctx.stroke();
            ctx.strokeStyle = '#0ff'; ctx.beginPath(); ctx.arc(500, 300, tableRadius, -0.3, 0.3); ctx.stroke();
        } else {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 10; ctx.strokeRect(0, 0, 1000, 600);
            const curY = (currentRound === 3) ? goalY : (600 - goalHeight)/2;
            ctx.fillStyle = '#0ff'; ctx.fillRect(0, curY, 8, goalHeight);
            ctx.fillStyle = '#f0f'; ctx.fillRect(992, curY, 8, goalHeight);
        }

        ctx.setLineDash([15, 15]); ctx.strokeStyle = '#111';
        ctx.beginPath(); ctx.moveTo(500, 0); ctx.lineTo(500, 600); ctx.stroke();
        ctx.setLineDash([]); 

        ctx.shadowBlur = 15; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, 15, 0, Math.PI*2); ctx.fill();

        drawP(p1); drawP(p2);

        if (respawnTimer > 0) {
            ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.font = "bold 80px sans-serif";
            ctx.fillText(Math.ceil(respawnTimer / 40), 500, 330);
        }
        ctx.restore(); 
    }

    function drawP(p) {
        ctx.shadowBlur = 15; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 32, 0, Math.PI*2); ctx.fill();
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
