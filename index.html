<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey - Pro Gravity Colosseum</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 10px; background: #222; padding: 12px; border-radius: 12px; border: 1px solid #0ff; display: flex; gap: 10px; align-items: center; z-index: 10; }
        canvas { border: 2px solid #333; background: #050505; cursor: none; box-shadow: 0 0 50px rgba(0,255,255,0.1); }
        .hud { display: flex; justify-content: space-between; width: 1000px; align-items: center; margin-bottom: 5px; }
        .score { font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 10px #0ff; min-width: 60px; text-align: center; }
        .series-dots { font-size: 1.5rem; letter-spacing: 5px; color: #444; }
        .series-dots .won { color: #0ff; text-shadow: 0 0 10px #0ff; }
        .series-dots.p2 .won { color: #f0f; text-shadow: 0 0 10px #f0f; }
        .round-display { font-size: 1.2rem; color: #fff; background: #333; padding: 5px 20px; border-radius: 20px; border: 1px solid #0ff; }
        button { background: #0ff; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.3s; color: #000; }
        button:hover { background: #fff; box-shadow: 0 0 15px #0ff; }
        input { background: #333; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; outline: none; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 50px; border-radius: 20px; text-align: center; border: 3px solid #0ff; display: none; z-index: 100; }
        #status { color: #888; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div id="menu">
        <div>My ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
    </div>

    <div class="hud">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s1">0</div>
            <div id="series-p1" class="series-dots">● ●</div>
        </div>
        <div class="round-display">ROUND <span id="round-num">1</span>: <span id="table-type">Velocity Surge</span></div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s2" style="color:#f0f; text-shadow: 0 0 10px #f0f;">0</div>
            <div id="series-p2" class="series-dots p2">● ●</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="status">Waiting for connection...</div>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 3rem;">-</h1>
        <p id="sub-text" style="color: #fff; font-size: 1.2rem;">Next round starting...</p>
        <button id="restart-btn" style="display:none; margin-top:20px;" onclick="resetFullMatch()">Play New Series</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    let isHost = false;
    let gameActive = true;

    const centerX = 500, centerY = 300; 
    const tableRadius = 280; 
    const goalHeight = 160;
    const WIN_SCORE = 13;
    const SERIES_TO_WIN = 2;
    
    let currentRound = 1;
    let scores = { p1: 0, p2: 0 };
    let seriesPoints = { p1: 0, p2: 0 };
    let respawnTimer = 0;
    let lastWinnerLabel = "";

    const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 15, friction: 0.994 };
    const p1 = { x: 150, y: 300, radius: 30, color: '#0ff' };
    const p2 = { x: 850, y: 300, radius: 30, color: '#f0f' };
    
    let goalY = (canvas.height - goalHeight) / 2;
    let goalDir = 1;

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isHost = true; setupConnection(); });

    function connectToFriend() {
        conn = peer.connect(document.getElementById('remote-id').value);
        isHost = false;
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "Status: Connected!";
            gameLoop();
            if(isHost) resetPuck();
        });

        conn.on('data', data => {
            if (isHost) {
                p2.x = data.x; p2.y = data.y;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y;
                puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores;
                seriesPoints = data.series;
                currentRound = data.round;
                gameActive = data.gameActive;
                goalY = data.goalY;
                respawnTimer = data.respawnTimer;
                lastWinnerLabel = data.lastWinnerLabel; 
                updateUI();
            }
        });
    }

    canvas.addEventListener('mousemove', e => {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if (isHost) {
            p1.x = Math.min(mx, canvas.width/2 - p1.radius);
            p1.y = Math.max(p1.radius, Math.min(canvas.height - p1.radius, my));
            if (currentRound === 2) applyCircleConstraint(p1, "left");
        } else {
            p2.x = Math.max(mx, canvas.width/2 + p2.radius);
            p2.y = Math.max(p2.radius, Math.min(canvas.height - p2.radius, my));
            if (currentRound === 2) applyCircleConstraint(p2, "right");
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    });

    function applyCircleConstraint(p, side) {
        let dx = p.x - centerX;
        let dy = p.y - centerY;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - p.radius) {
            let angle = Math.atan2(dy, dx);
            p.x = centerX + Math.cos(angle) * (tableRadius - p.radius);
            p.y = centerY + Math.sin(angle) * (tableRadius - p.radius);
        }
        if (side === "left") p.x = Math.min(p.x, centerX - 5);
        else p.x = Math.max(p.x, centerX + 5);
    }

    function update() {
        if (!isHost || !gameActive) return;

        if (respawnTimer > 0) {
            respawnTimer--;
            if (respawnTimer === 0) {
                puck.dx = (Math.random() > 0.5 ? 8 : -8);
                puck.dy = (Math.random() - 0.5) * 14;
            }
            syncData();
            return;
        }

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        if (currentRound === 2) {
            updateCirclePhysics();
        } else {
            updateRectPhysics();
        }

        checkCollision(p1, puck);
        checkCollision(p2, puck);
        updateUI();
        syncData();
    }

    function syncData() {
        if (conn && conn.open) {
            conn.send({ p1, puck, scores, series: seriesPoints, round: currentRound, gameActive, goalY, respawnTimer, lastWinnerLabel });
        }
    }

    function updateRectPhysics() {
        if (currentRound === 1) {
            const pipeXStart = centerX - 75;
            const pipeXEnd = centerX + 75;
            if (puck.y < puck.radius && puck.x > pipeXStart && puck.x < pipeXEnd) {
                puck.dy = 12; puck.dx = (puck.x < centerX) ? 10 : -10; puck.y = puck.radius + 15;
            } else if (puck.y > canvas.height - puck.radius && puck.x > pipeXStart && puck.x < pipeXEnd) {
                puck.dy = -12; puck.dx = (puck.x < centerX) ? 10 : -10; puck.y = canvas.height - puck.radius - 15;
            }
        }
        
        if (currentRound >= 3) {
            goalY += 6 * goalDir;
            if (goalY > canvas.height - goalHeight || goalY < 0) goalDir *= -1;
        }

        const curGoalTop = (currentRound >= 3) ? goalY : (canvas.height - goalHeight)/2;
        const curGoalBottom = curGoalTop + goalHeight;

        if (puck.y < puck.radius) { puck.y = puck.radius; puck.dy *= -1; }
        else if (puck.y > canvas.height - puck.radius) { puck.y = canvas.height - puck.radius; puck.dy *= -1; }

        if (puck.x < puck.radius) {
            if (puck.y > curGoalTop && puck.y < curGoalBottom) { scores.p2++; resetPuck(); }
            else { puck.x = puck.radius; puck.dx *= -1; }
        } else if (puck.x > canvas.width - puck.radius) {
            if (puck.y > curGoalTop && puck.y < curGoalBottom) { scores.p1++; resetPuck(); }
            else { puck.x = canvas.width - puck.radius; puck.dx *= -1; }
        }
    }

    function updateCirclePhysics() {
        let dx = puck.x - centerX;
        let dy = puck.y - centerY;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 200) {
            puck.dx -= dx * 0.0015;
            puck.dy -= dy * 0.0015;
        }

        if (dist > tableRadius - puck.radius) {
            let angle = Math.atan2(dy, dx);
            let deg = angle * (180 / Math.PI);
            
            if (Math.abs(deg) < 22) { scores.p1++; resetPuck(); }
            else if (Math.abs(deg) > 158) { scores.p2++; resetPuck(); }
            else {
                let normalAngle = Math.atan2(dy, dx);
                let speed = Math.sqrt(puck.dx**2 + puck.dy**2);
                let incidentAngle = Math.atan2(puck.dy, puck.dx);
                let reflectionAngle = 2 * normalAngle - incidentAngle + Math.PI;
                puck.dx = Math.cos(reflectionAngle) * speed;
                puck.dy = Math.sin(reflectionAngle) * speed;
                puck.x = centerX + Math.cos(normalAngle) * (tableRadius - puck.radius - 2);
                puck.y = centerY + Math.sin(normalAngle) * (tableRadius - puck.radius - 2);
            }
        }
    }

    function checkCollision(paddle, pk) {
        let dx = pk.x - paddle.x;
        let dy = pk.y - paddle.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < paddle.radius + pk.radius) {
            let angle = Math.atan2(dy, dx);
            let speed = Math.sqrt(pk.dx**2 + pk.dy**2) + 3;
            pk.dx = Math.cos(angle) * Math.min(speed, 24);
            pk.dy = Math.sin(angle) * Math.min(speed, 24);
            pk.x = paddle.x + Math.cos(angle) * (paddle.radius + pk.radius + 2);
            pk.y = paddle.y + Math.sin(angle) * (paddle.radius + pk.radius + 2);
        }
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;
        document.getElementById('round-num').innerText = currentRound;
        const labels = ["VELOCITY SURGE", "Zero-G Colosseum", "Shifting Nexus"];
        document.getElementById('table-type').innerText = labels[currentRound-1] || "FINAL";
        
        const renderDots = (id, pts) => {
            let dots = "";
            for(let i=0; i<SERIES_TO_WIN; i++) dots += `<span class="${i < pts ? 'won' : ''}">●</span> `;
            document.getElementById(id).innerHTML = dots;
        };
        renderDots('series-p1', seriesPoints.p1);
        renderDots('series-p2', seriesPoints.p2);

        if (!gameActive) {
            const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
            document.getElementById('winner-text').innerText = isMatchOver ? lastWinnerLabel + " WINS MATCH!" : lastWinnerLabel + " WINS ROUND!";
            document.getElementById('overlay').style.display = 'block';
        } else {
            document.getElementById('overlay').style.display = 'none';
        }
    }

    function resetPuck() {
        puck.x = centerX; puck.y = centerY;
        puck.dx = 0; puck.dy = 0;
        if(isHost) {
            if (scores.p1 >= WIN_SCORE) startNewRound("PLAYER 1");
            else if (scores.p2 >= WIN_SCORE) startNewRound("PLAYER 2");
            else respawnTimer = 180;
        }
    }

    function startNewRound(winner) {
        gameActive = false;
        lastWinnerLabel = winner;
        seriesPoints[winner === "PLAYER 1" ? 'p1' : 'p2']++;
        
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
        if (isMatchOver && isHost) document.getElementById('restart-btn').style.display = 'inline-block';
        
        updateUI();
        syncData(); // Important to push the win label immediately

        if (!isMatchOver) {
            setTimeout(() => {
                scores = {p1:0, p2:0}; 
                currentRound++; 
                gameActive = true; 
                resetPuck(); 
                updateUI();
            }, 3000);
        }
    }

    function resetFullMatch() {
        seriesPoints = { p1: 0, p2: 0 }; scores = { p1: 0, p2: 0 };
        currentRound = 1; gameActive = true; lastWinnerLabel = "";
        document.getElementById('restart-btn').style.display = 'none';
        resetPuck(); updateUI();
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (currentRound === 2) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, tableRadius, 0, Math.PI * 2);
            ctx.clip();
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            let grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, tableRadius);
            grad.addColorStop(0, 'rgba(0, 255, 255, 0.08)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();

            ctx.beginPath();
            ctx.arc(centerX, centerY, tableRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 10;
            ctx.stroke();

            ctx.lineWidth = 15;
            ctx.strokeStyle = '#f0f'; 
            ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, Math.PI - 0.4, Math.PI + 0.4); ctx.stroke();
            ctx.strokeStyle = '#0ff'; 
            ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, -0.4, 0.4); ctx.stroke();
        } else {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#333'; ctx.lineWidth = 10;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            const curY = (currentRound >= 3) ? goalY : (canvas.height - goalHeight)/2;
            ctx.fillStyle = '#0ff'; ctx.fillRect(0, curY, 10, goalHeight);
            ctx.fillStyle = '#f0f'; ctx.fillRect(canvas.width-10, curY, 10, goalHeight);
        }

        if (currentRound === 1) {
            ctx.shadowBlur = 20; ctx.shadowColor = '#0f0'; ctx.fillStyle = '#0f0';
            ctx.fillRect(centerX-75, -10, 150, 15); ctx.fillRect(centerX-75, canvas.height - 5, 150, 15);
        }

        ctx.shadowBlur = 0; ctx.setLineDash([10, 10]); ctx.strokeStyle = '#222';
        ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();
        ctx.setLineDash([]);

        ctx.shadowBlur = 15; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
        
        drawP(p1); drawP(p2);

        if (respawnTimer > 0) {
            ctx.textAlign = "center";
            ctx.shadowBlur = 10; ctx.shadowColor = "#000";
            if (respawnTimer > 120) {
                ctx.fillStyle = "#fff"; ctx.font = "bold 80px 'Segoe UI'";
                ctx.fillText("GOAL!", centerX, centerY - 20);
            } else {
                ctx.fillStyle = "#0ff"; ctx.font = "bold 100px 'Segoe UI'";
                ctx.fillText(Math.ceil(respawnTimer / 60), centerX, centerY + 30);
            }
        }
    }

    function drawP(p) {
        ctx.shadowBlur = 20; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
