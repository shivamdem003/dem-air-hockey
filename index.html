<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey - Pro Gravity Colosseum</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            background: #050505; 
            color: #0ff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        #menu { 
            width: 100%;
            max-width: 1000px;
            margin-bottom: 10px; 
            background: #1a1a1a; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            align-items: center; 
            justify-content: center;
            z-index: 10; 
        }

        /* Responsive Canvas Scaling */
        canvas { 
            width: 95vw; 
            max-width: 1000px;
            height: auto; 
            aspect-ratio: 1000 / 600; 
            border: 2px solid #222; 
            background: #000; 
            box-shadow: 0 0 30px rgba(0,255,255,0.05); 
            touch-action: none; 
        }

        .hud { 
            display: flex; 
            justify-content: space-between; 
            width: 95vw; 
            max-width: 1000px;
            align-items: center; 
            margin-bottom: 15px; 
        }

        .score { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 10px #0ff; min-width: 60px; text-align: center; }
        .series-dots { font-size: 1.2rem; letter-spacing: 3px; color: #333; }
        .series-dots .won { color: #0ff; text-shadow: 0 0 8px #0ff; }
        .series-dots.p2 .won { color: #f0f; text-shadow: 0 0 8px #f0f; }
        
        .round-display { 
            text-align: center; 
            color: #ccc; 
            background: rgba(255,255,255,0.03); 
            padding: 8px 20px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            min-width: 180px; 
        }

        #round-label { font-size: 0.7rem; letter-spacing: 2px; color: #888; text-transform: uppercase; }
        #table-type { display: block; font-size: 1.4rem; font-weight: 900; color: #fff; text-transform: uppercase; }

        button { background: #0ff; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; color: #000; text-transform: uppercase; font-size: 0.8rem; }
        button:disabled { background: #222; color: #444; }
        #pause-btn { background: #ffaa00; }

        input { background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 140px; }
        
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.96); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #0ff; display: none; z-index: 100; width: 80%; max-width: 500px; }
        
        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .score { font-size: 1.8rem; }
            #table-type { font-size: 1rem; }
            .round-display { min-width: 120px; }
            #menu { padding: 8px; font-size: 0.8rem; }
            input { width: 100px; }
        }

        .stats-container { margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 8px; align-items: center; }
        .stat-label { color: #888; font-size: 0.7rem; text-transform: uppercase; }
        .stat-val { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .rank-letter { font-size: 3rem; font-weight: 900; margin: 5px 0; }
        .rank-s { color: #ffdf00; text-shadow: 0 0 15px #ffdf00; }
    </style>
</head>
<body>

    <div id="menu">
        <div>ID: <strong id="my-id" style="color:white">...</strong></div>
        <input type="text" id="remote-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
        <button id="pause-btn" onclick="requestPause()">Pause</button>
        <div style="font-size: 0.8rem; color: #888;">P: <span id="p1-pauses">4</span>|<span id="p2-pauses">4</span></div>
    </div>

    <div class="hud">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s1">0</div>
            <div id="series-p1" class="series-dots">● ●</div>
        </div>
        
        <div class="round-display">
            <div id="round-label">ROUND <span id="round-num">1</span></div>
            <span id="table-type">VELOCITY SURGE</span>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="score" id="s2" style="color:#f0f; text-shadow: 0 0 10px #f0f;">0</div>
            <div id="series-p2" class="series-dots p2">● ●</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="status" style="color: #555; margin-top: 5px; font-size: 0.8rem;">Waiting for connection...</div>

    <div id="overlay">
        <h1 id="winner-text" style="margin:0; font-size: 1.8rem;">-</h1>
        <p id="sub-text" style="color: #888; font-size: 0.9rem;">Preparing arena...</p>
        
        <div id="stats-ui" class="stats-container" style="display:none;">
            <div class="stats-grid">
                <div class="rank-box"><div class="stat-label">Rank</div><div class="rank-letter" id="rank-p1">-</div></div>
                <div></div>
                <div class="rank-box"><div class="stat-label">Rank</div><div class="rank-letter" id="rank-p2">-</div></div>
                <div class="stat-val" id="stat-p1-goals" style="color:#0ff">0</div><div class="stat-label">Goals</div><div class="stat-val" id="stat-p2-goals" style="color:#f0f">0</div>
                <div class="stat-val" id="stat-p1-saves" style="color:#0ff">0</div><div class="stat-label">Saves</div><div class="stat-val" id="stat-p2-saves" style="color:#f0f">0</div>
            </div>
        </div>

        <div style="margin-top:20px; display: flex; gap:10px; justify-content: center;">
            <button id="resume-btn" style="display:none; background:#0f0;" onclick="resumeGame()">Resume</button>
            <button id="restart-btn" style="display:none;" onclick="resetFullMatch()">New Series</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    let isHost = false, gameActive = true, isPaused = false, disconnected = false;

    const centerX = 500, centerY = 300, tableRadius = 280, cornerRadius = 45, goalHeight = 160;
    const WIN_SCORE = 13, SERIES_TO_WIN = 2;
    
    let currentRound = 1, lastWinnerLabel = "", shakeIntensity = 0; 
    let scores = { p1: 0, p2: 0 }, seriesPoints = { p1: 0, p2: 0 }, pausesLeft = { p1: 4, p2: 4 };
    let respawnTimer = 0, lastHitter = 0;

    let matchStats = {
        p1: { goals: 0, saves: 0, ownGoals: 0, totalHits: 0, rank: "C" },
        p2: { goals: 0, saves: 0, ownGoals: 0, totalHits: 0, rank: "C" }
    };

    const puck = { x: 500, y: 300, dx: 0, dy: 0, radius: 15, friction: 0.993 };
    const p1 = { x: 150, y: 300, vx: 0, vy: 0, radius: 32, color: '#0ff' };
    const p2 = { x: 850, y: 300, vx: 0, vy: 0, radius: 32, color: '#f0f' };
    let goalY = (canvas.height - goalHeight) / 2, goalDir = 1;

    // --- RESPONSIVE INPUT LOGIC ---
    function getScaledInput(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
        const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function handleInput(e) {
        if (!gameActive || isPaused || disconnected) return;
        const pos = getScaledInput(e);

        if (isHost) {
            p1.vx = pos.x - p1.x; p1.vy = pos.y - p1.y;
            p1.x = Math.min(pos.x, canvas.width/2 - p1.radius);
            p1.y = Math.max(p1.radius, Math.min(canvas.height - p1.radius, pos.y));
            if (currentRound === 2) applyCircleConstraint(p1, "left");
        } else {
            p2.x = Math.max(pos.x, canvas.width/2 + p2.radius);
            p2.y = Math.max(p2.radius, Math.min(canvas.height - p2.radius, pos.y));
            if (currentRound === 2) applyCircleConstraint(p2, "right");
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    }

    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });

    // --- PEERJS LOGIC ---
    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', c => { conn = c; isHost = true; setupConnection(); });

    function connectToFriend() {
        conn = peer.connect(document.getElementById('remote-id').value);
        isHost = false; setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "LINK ESTABLISHED";
            disconnected = false; if(isHost) resetPuck();
            gameLoop();
        });
        conn.on('close', () => handleDisconnection());
        conn.on('data', data => {
            if (data.type === 'PAUSE_REQ') handlePauseRequest(data.player);
            else if (data.type === 'RESUME') { isPaused = false; updateUI(); }
            else if (isHost) {
                p2.vx = data.x - p2.x; p2.vy = data.y - p2.y;
                p2.x = data.x; p2.y = data.y;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y; puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores; seriesPoints = data.series; pausesLeft = data.pausesLeft;
                currentRound = data.round; gameActive = data.gameActive; isPaused = data.isPaused;
                matchStats = data.stats; goalY = data.goalY; respawnTimer = data.respawnTimer;
                lastWinnerLabel = data.lastWinnerLabel; 
                if (respawnTimer >= 158) shakeIntensity = 12;
                updateUI();
            }
        });
    }

    // --- GAME ENGINE ---
    function update() {
        if (shakeIntensity > 0) shakeIntensity *= 0.92;
        if (isPaused || disconnected || !isHost || !gameActive) return;

        if (respawnTimer > 0) {
            respawnTimer--;
            if (respawnTimer === 0) {
                puck.dx = (Math.random() > 0.5 ? 3.5 : -3.5);
                puck.dy = (Math.random() - 0.5) * 5;
            }
            syncData(); return;
        }

        puck.x += puck.dx; puck.y += puck.dy;
        puck.dx *= puck.friction; puck.dy *= puck.friction;

        if (currentRound === 2) updateCirclePhysics();
        else updateRectPhysics();

        checkCollision(p1, puck, 1);
        checkCollision(p2, puck, 2);
        updateUI(); syncData();
    }

    function checkCollision(paddle, pk, pNum) {
        let dx = pk.x - paddle.x, dy = pk.y - paddle.y, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < paddle.radius + pk.radius) {
            matchStats['p' + pNum].totalHits++;
            if ((pNum === 1 && pk.dx < 0) || (pNum === 2 && pk.dx > 0)) matchStats['p' + pNum].saves++;
            lastHitter = pNum;
            let angle = Math.atan2(dy, dx), impactVel = Math.sqrt(paddle.vx**2 + paddle.vy**2);
            let speed = Math.sqrt(pk.dx**2 + pk.dy**2) + (impactVel * 0.4) + 1.5;
            pk.dx = Math.cos(angle) * Math.min(speed, 21); pk.dy = Math.sin(angle) * Math.min(speed, 21);
            pk.x = paddle.x + Math.cos(angle) * (paddle.radius + pk.radius + 2);
            pk.y = paddle.y + Math.sin(angle) * (paddle.radius + pk.radius + 2);
        }
    }

    function updateRectPhysics() {
        const curGoalTop = (currentRound === 3) ? goalY : (canvas.height - goalHeight)/2;
        const curGoalBottom = curGoalTop + goalHeight;
        
        if (currentRound === 3) {
            goalY += 5.5 * goalDir;
            if (goalY > canvas.height - goalHeight || goalY < 0) goalDir *= -1;
        }

        if (puck.y < puck.radius || puck.y > canvas.height - puck.radius) { puck.dy *= -1; }
        
        if (puck.x < puck.radius) {
            if (puck.y > curGoalTop && puck.y < curGoalBottom) triggerGoal(1);
            else { puck.x = puck.radius; puck.dx *= -1; }
        } else if (puck.x > canvas.width - puck.radius) {
            if (puck.y > curGoalTop && puck.y < curGoalBottom) triggerGoal(2);
            else { puck.x = canvas.width - puck.radius; puck.dx *= -1; }
        }
    }

    function updateCirclePhysics() {
        let dx = puck.x - centerX, dy = puck.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - puck.radius) {
            let angle = Math.atan2(dy, dx), deg = angle * (180 / Math.PI);
            if (Math.abs(deg) < 22) triggerGoal(2);
            else if (Math.abs(deg) > 158) triggerGoal(1);
            else {
                let normal = Math.atan2(dy, dx), speed = Math.sqrt(puck.dx**2 + puck.dy**2);
                let reflection = 2 * normal - Math.atan2(puck.dy, puck.dx) + Math.PI;
                puck.dx = Math.cos(reflection) * speed * 0.99; puck.dy = Math.sin(reflection) * speed * 0.99;
                puck.x = centerX + Math.cos(normal) * (tableRadius - puck.radius - 2);
                puck.y = centerY + Math.sin(normal) * (tableRadius - puck.radius - 2);
            }
        }
    }

    function applyCircleConstraint(p, side) {
        let dx = p.x - centerX, dy = p.y - centerY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > tableRadius - p.radius) {
            let angle = Math.atan2(dy, dx);
            p.x = centerX + Math.cos(angle) * (tableRadius - p.radius);
            p.y = centerY + Math.sin(angle) * (tableRadius - p.radius);
        }
        p.x = (side === "left") ? Math.min(p.x, centerX - 5) : Math.max(p.x, centerX + 5);
    }

    function triggerGoal(scoredOnPlayer) {
        if (scoredOnPlayer === 1) { scores.p2++; if (lastHitter === 2) matchStats.p2.goals++; } 
        else { scores.p1++; if (lastHitter === 1) matchStats.p1.goals++; }
        shakeIntensity = 15; resetPuck();
    }

    function syncData() {
        if (conn && conn.open && isHost) {
            conn.send({ p1, puck, scores, series: seriesPoints, pausesLeft, round: currentRound, gameActive, isPaused, goalY, respawnTimer, lastWinnerLabel, stats: matchStats });
        }
    }

    function resetPuck() {
        puck.x = centerX; puck.y = centerY; puck.dx = 0; puck.dy = 0;
        if(isHost) {
            if (scores.p1 >= WIN_SCORE) startNewRound("PLAYER 1");
            else if (scores.p2 >= WIN_SCORE) startNewRound("PLAYER 2");
            else respawnTimer = 160;
        }
    }

    function startNewRound(winner) {
        gameActive = false; lastWinnerLabel = winner; seriesPoints[winner === "PLAYER 1" ? 'p1' : 'p2']++;
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
        if (isMatchOver && isHost) {
            matchStats.p1.rank = calculateGrade('p1');
            matchStats.p2.rank = calculateGrade('p2');
        }
        updateUI(); syncData(); 
        if (!isMatchOver) {
            setTimeout(() => {
                scores = {p1:0, p2:0}; currentRound++; gameActive = true; resetPuck(); updateUI();
            }, 3000);
        }
    }

    function calculateGrade(pKey) {
        const s = matchStats[pKey];
        let score = (s.goals * 25) + (s.saves * 12);
        if (score >= 400) return "S";
        if (score >= 250) return "A";
        return "B";
    }

    function updateUI() {
        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;
        document.getElementById('round-num').innerText = currentRound;
        document.getElementById('p1-pauses').innerText = pausesLeft.p1;
        document.getElementById('p2-pauses').innerText = pausesLeft.p2;
        
        const isMatchOver = seriesPoints.p1 >= SERIES_TO_WIN || seriesPoints.p2 >= SERIES_TO_WIN;
        const overlay = document.getElementById('overlay');

        if (isPaused) {
            overlay.style.display = 'block';
            document.getElementById('winner-text').innerText = "PAUSED";
            document.getElementById('resume-btn').style.display = 'inline-block';
        } else if (!gameActive) {
            overlay.style.display = 'block';
            document.getElementById('winner-text').innerText = lastWinnerLabel + (isMatchOver ? " CHAMPION" : " ROUND WIN");
            if (isMatchOver) {
                document.getElementById('stats-ui').style.display = 'block';
                document.getElementById('rank-p1').innerText = matchStats.p1.rank;
                document.getElementById('rank-p2').innerText = matchStats.p2.rank;
                if(isHost) document.getElementById('restart-btn').style.display = 'inline-block';
            }
        } else { overlay.style.display = 'none'; }
        
        const renderDots = (id, pts) => {
            let dots = ""; for(let i=0; i<SERIES_TO_WIN; i++) dots += `<span class="${i < pts ? 'won' : ''}">●</span> `;
            document.getElementById(id).innerHTML = dots;
        };
        renderDots('series-p1', seriesPoints.p1); renderDots('series-p2', seriesPoints.p2);
    }

    function requestPause() {
        if (!gameActive || isPaused) return;
        const player = isHost ? 'p1' : 'p2';
        if (pausesLeft[player] > 0) {
            if (isHost) handlePauseRequest('p1');
            else conn.send({ type: 'PAUSE_REQ', player: 'p2' });
        }
    }

    function handlePauseRequest(player) {
        isPaused = true; pausesLeft[player]--;
        syncData(); updateUI();
    }

    function resumeGame() {
        isPaused = false;
        if (isHost) syncData(); else conn.send({ type: 'RESUME' });
        updateUI();
    }

    function handleDisconnection() {
        disconnected = true; gameActive = false;
        document.getElementById('status').innerText = "DISCONNECTED";
        updateUI();
    }

    function draw() {
        ctx.save();
        if (shakeIntensity > 0.5) ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity);
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (currentRound === 2) {
            ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 6; ctx.stroke();
            ctx.strokeStyle = '#f0f'; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, Math.PI - 0.35, Math.PI + 0.35); ctx.stroke();
            ctx.strokeStyle = '#0ff'; ctx.beginPath(); ctx.arc(centerX, centerY, tableRadius, -0.35, 0.35); ctx.stroke();
        } else {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 6; ctx.strokeRect(0, 0, canvas.width, canvas.height);
            const curY = (currentRound === 3) ? goalY : (canvas.height - goalHeight)/2;
            ctx.fillStyle = '#0ff'; ctx.fillRect(0, curY, 6, goalHeight);
            ctx.fillStyle = '#f0f'; ctx.fillRect(canvas.width-6, curY, 6, goalHeight);
        }

        ctx.setLineDash([15, 15]); ctx.strokeStyle = '#1a1a1a';
        ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();
        ctx.setLineDash([]); 

        // Puck
        ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();

        // Paddles
        drawP(p1); drawP(p2);

        if (respawnTimer > 0) {
            ctx.textAlign = "center"; ctx.fillStyle = "#0ff"; ctx.font = "bold 60px 'Segoe UI'";
            ctx.fillText(Math.ceil(respawnTimer / 60), centerX, centerY + 20);
        }
        ctx.restore(); 
    }

    function drawP(p) {
        ctx.shadowBlur = 12; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
