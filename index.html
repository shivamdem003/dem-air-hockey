<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Air Hockey - Pro Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #menu { margin-bottom: 15px; background: #222; padding: 15px; border-radius: 12px; border: 1px solid #0ff; box-shadow: 0 0 10px rgba(0,255,255,0.2); display: flex; gap: 10px; align-items: center; }
        canvas { border: 4px solid #444; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); cursor: none; box-shadow: 0 0 30px rgba(0,255,255,0.1); }
        .score { font-size: 2.5rem; font-weight: bold; margin: 10px; text-shadow: 0 0 10px #0ff; letter-spacing: 5px; }
        button { background: #0ff; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.3s; color: #000; }
        button:hover { background: #fff; box-shadow: 0 0 15px #0ff; }
        input { background: #333; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; outline: none; }
        #status { color: #888; margin-top: 10px; font-style: italic; }
        strong { color: #fff; }
    </style>
</head>
<body>

    <div id="menu">
        <div id="id-tag">My ID: <strong id="my-id">...</strong></div>
        <input type="text" id="remote-id" placeholder="Paste Friend's ID">
        <button onclick="connectToFriend()">Connect</button>
    </div>

    <div class="score"><span id="s1">0</span> : <span id="s2">0</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="status">Waiting for connection...</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer(); 
    let conn;
    let isHost = false;

    // Game Constants
    const goalHeight = 160;
    const goalTop = (canvas.height - goalHeight) / 2;
    const goalBottom = goalTop + goalHeight;
    
    // Game State
    let scores = { p1: 0, p2: 0 };
    const puck = { x: 400, y: 250, dx: 0, dy: 0, radius: 15, friction: 0.985 };
    const p1 = { x: 100, y: 250, radius: 30, color: '#0ff' }; // Host (Cyan)
    const p2 = { x: 700, y: 250, radius: 30, color: '#f0f' }; // Client (Magenta)

    peer.on('open', id => document.getElementById('my-id').innerText = id);

    // Host Listener
    peer.on('connection', c => {
        conn = c;
        isHost = true;
        setupConnection();
    });

    // Client Action
    function connectToFriend() {
        conn = peer.connect(document.getElementById('remote-id').value);
        isHost = false;
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "Status: Connected!";
            if(isHost) {
                resetPuck();
                gameLoop();
            }
        });

        conn.on('data', data => {
            if (isHost) {
                // Host receives Client (P2) position
                p2.x = data.x; 
                p2.y = data.y;
            } else {
                // Client receives full state from Host
                p1.x = data.p1.x; p1.y = data.p1.y;
                puck.x = data.puck.x; puck.y = data.puck.y;
                scores = data.scores;
                document.getElementById('s1').innerText = scores.p1;
                document.getElementById('s2').innerText = scores.p2;
                gameLoop(); // Start client loop once data arrives
            }
        });
    }

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        let mx = e.clientX - rect.left;
        let my = e.clientY - rect.top;

        if (isHost) {
            p1.x = Math.min(mx, canvas.width/2 - p1.radius);
            p1.y = Math.max(p1.radius, Math.min(canvas.height - p1.radius, my));
            if (conn && conn.open) sendState();
        } else {
            p2.x = Math.max(mx, canvas.width/2 + p2.radius);
            p2.y = Math.max(p2.radius, Math.min(canvas.height - p2.radius, my));
            if (conn && conn.open) conn.send({ x: p2.x, y: p2.y });
        }
    });

    function checkCollision(paddle, pk) {
        let dx = pk.x - paddle.x;
        let dy = pk.y - paddle.y;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if (distance < paddle.radius + pk.radius) {
            let angle = Math.atan2(dy, dx);
            let speed = Math.sqrt(pk.dx**2 + pk.dy**2) + 3; // Boost speed on hit
            if (speed > 15) speed = 15;

            pk.dx = Math.cos(angle) * speed;
            pk.dy = Math.sin(angle) * speed;
            
            // Prevent sticking by pushing puck out of paddle
            pk.x = paddle.x + Math.cos(angle) * (paddle.radius + pk.radius + 2);
            pk.y = paddle.y + Math.sin(angle) * (paddle.radius + pk.radius + 2);
        }
    }

    function resetPuck() {
        puck.x = 400; puck.y = 250;
        puck.dx = (Math.random() > 0.5 ? 5 : -5);
        puck.dy = (Math.random() - 0.5) * 8;
    }

    function sendState() {
        conn.send({
            p1: { x: p1.x, y: p1.y },
            puck: { x: puck.x, y: puck.y },
            scores: scores
        });
    }

    function update() {
        if (!isHost) return;

        puck.x += puck.dx; 
        puck.y += puck.dy;
        puck.dx *= puck.friction; 
        puck.dy *= puck.friction;

        // Top/Bottom Wall Clamping
        if (puck.y < puck.radius) {
            puck.y = puck.radius;
            puck.dy *= -1;
        } else if (puck.y > canvas.height - puck.radius) {
            puck.y = canvas.height - puck.radius;
            puck.dy *= -1;
        }

        // Left Goal / Wall
        if (puck.x < puck.radius) {
            if (puck.y > goalTop && puck.y < goalBottom) {
                scores.p2++; resetPuck();
            } else {
                puck.x = puck.radius;
                puck.dx *= -1;
            }
        }
        
        // Right Goal / Wall
        if (puck.x > canvas.width - puck.radius) {
            if (puck.y > goalTop && puck.y < goalBottom) {
                scores.p1++; resetPuck();
            } else {
                puck.x = canvas.width - puck.radius;
                puck.dx *= -1;
            }
        }

        checkCollision(p1, puck);
        checkCollision(p2, puck);

        document.getElementById('s1').innerText = scores.p1;
        document.getElementById('s2').innerText = scores.p2;
        
        if (conn && conn.open) sendState();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Center Line
        ctx.strokeStyle = '#444';
        ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
        ctx.setLineDash([]);

        // Goals
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 4;
        ctx.strokeRect(-5, goalTop, 15, goalHeight);
        ctx.strokeRect(canvas.width - 10, goalTop, 15, goalHeight);

        // Puck
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Paddles
        drawPaddle(p1);
        drawPaddle(p2);
    }

    function drawPaddle(p) {
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 20; ctx.shadowColor = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        // Inner detail
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius * 0.7, 0, Math.PI*2); ctx.stroke();
        ctx.shadowBlur = 0;
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
